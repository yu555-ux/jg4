势力名称: 合欢宗

基本信息:
  定位: 邪三宗之一，全女修宗门
  核心理念: 天地阴阳，损有余而补不足
  势力评级: 顶级

修行体系:
  主修功法: 《素女飞升经》
  体系特点:
    - 采阳补阴: 视男子为"人丹"。通过交合汲取男修的修为。若手段温和，男修只损部分修为；若手段狠辣，男修则会精尽人亡。
    - 媚术: 该功法媚术众多
    - 阴阳锁: 可将男修精元锁在子宫内
  辅助体系:
    - 房中术: 三百六十种交合体位与技巧
    - 驻颜: 炼制驻颜丹与美体药液

规模与结构:
  组织架构:
    最高权力:
      - 极乐宫主: 统领全宗
      - 十二花主: 分别以十二种名花为号（如牡丹、海棠、芍药），掌管十二分舵。
    职能部门:
      - 寻芳阁: 负责在凡俗界与修仙界物色资质上佳的男童或男修，抓捕带回宗门。
      - 调教司: 负责将抓来的男子驯化为听话的炉鼎
      - 醉梦楼: 遍布天下的青楼楚馆，既是敛财工具，也是情报收集站。
      - 护花卫: 由被完全洗脑、实力强大的男修组成
    人员构成:
      - 宗主
      - 十二花主/圣女
      - 内门弟子: 筑基期以上，可拥有独立的炉鼎院。
      - 外门弟子: 负责打理醉梦楼生意，表现优异者可获赐炉鼎修炼。
      - 炉鼎: 毫无地位的男性，被圈养在特定区域

核心人物:
  姬红裳 (极乐宫主):
    身份: 宗主
    修为: 合体大圆满
    特质:
      - 艳冠天下: 被誉为"东灵第一美人"，也是无数男修的梦魇。据说见过她真容的男人，除了死人，都成了她的裙下之臣。
      - 采补狂魔: 曾在一夜之间采补了三千名筑基男修，借此突破合体期瓶颈，手段极其残忍。
      - 极度厌男: 表面上对男人温柔似水，实则内心极度鄙夷，认为男人只是低贱的工具。

  白灵儿 (天香圣女):
    身份: 宗主亲传，圣女
    修为: 元婴初期
    特质:
      - 极品名器: 天生"九曲玲珑体"，内壁褶皱繁复且自带吸力，是传说中采补效果最好的体质。但作为合欢宗圣女，她是被采补者还是采补者，往往只在一念之间。
      - 纯欲天成: 不同于其他妖女的骚浪，她修的是"纯欲"之道。外表清纯如小白花，实则精通所有房中秘术，最擅长让男人在保护欲中被榨干。

宗门地理与设施:
  地理定位:
    区域: 东灵域 · 落花盆地 · 极乐谷
    地貌: 位于盆地中央，四周被桃花瘴常年笼罩，谷内四季如春
  整体格局:
    描述: 建筑多用粉玉、红纱与黄金装饰

  区域详解:
    销金窟:
      解释: 对外开放的区域
      主要设施:
        - 迎客花径: 两侧种满合欢树的大道，每棵树下都站着轻纱遮体的女修迎接宾客。
        - 极乐汤泉: 露天浴池，在此沐浴可享受女修的推拿与侍奉。
        - 阴阳阁: 供客人双修

    养丹地:
      解释: 圈养与调教炉鼎的区域
      主要设施:
        - 囚阳牢: 水牢，关押着刚抓来的男修或女修。
        - 驯奴院: 充满各种调教刑具的院落，教导被掳来的女子侍奉男人
        - 丹房: 提供男修或者女修作为炉鼎，供更尊贵的客人使用

    媚骨林:
      解释: 内门弟子与高层居住区。
      主要设施:
        - 落英楼: 十二花主的居所
        - 双修殿: 没有任何隔断，供多名弟子同时进行采补修炼，以此互相攀比技巧。

    极乐天宫:
      解释: 姬红裳的寝宫
      主要设施:
        - 欢喜塌: 一张方圆十丈的巨大软榻，由万年温玉制成。
        - 藏精阁: 存放历代宗主采补心得与高阶双修秘籍的密室。
        - 万艳池: 姬红裳沐浴之处，池水由无数男修的精元与灵药调配而成，呈淡白色，具驻颜神效。

与外界关系:
  金刚宗:
    关系: 死敌
    描述: 合欢宗妖女最喜欢勾引金刚宗的和尚破戒，，金刚宗则见合欢宗必杀

  影杀楼:
    关系: 合作
    描述: 合欢宗负责在床笫之间搜集情报与软肋，影杀楼负责动手杀人。两家经常共享情报网

  血魔教/噬魂殿:
    关系: 盟友
    描述: 同为魔道巨擘，三家在面对正道围剿时会联手。但在利益分配上，三家也常有内斗。
