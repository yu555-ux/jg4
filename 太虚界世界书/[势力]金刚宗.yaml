势力名称: 金刚宗

基本信息:
  定位: 太虚界第一佛门圣地
  核心理念: 苦海无边，肉身作舟；金刚怒目，只杀不渡
  势力评级: 一流上等

修行体系:
  主修功法: 《大日如来诀》
  体系特点:
    - 肉身成圣: 元婴境不破金丹，金丹进一步凝成"不灭金刚舍利"，可增强肉身强度
    - 万法不侵: 功法大成者，肉身可硬抗同阶法宝轰击而毫发无损，万毒不侵，水火不入。
    - 力破万法: 追求极致的力量与速度，一力破万法
  辅助体系:
    - 狮子吼: 佛门音波功，专杀邪魔外道
    - 苦行禅: 通过行走极端环境来磨练意志

规模与结构:
  组织架构:
    最高权力:
      - 圣僧堂: 由方丈与三位闭死关的太上长老组成。
    职能部门:
      - 达摩院: 专研高深武学与神通。
      - 罗汉堂: 负责宗门护卫与对外征战
      - 戒律院: 掌管刑罚，负责捉拿破戒弟子与铲除魔道。
      - 般若堂: 负责经书典籍的管理与佛法研讨
      - 知客院: 负责接待香客与处理俗务。
    人员构成:
      - 佛子: 宗门未来的继承人
      - 亲传弟子: 各堂堂主的弟子
      - 内门弟子: 构成了著名的八百罗汉阵"
      - 外门弟子: 数量众多，需苦禅才可修行，但亦可旁听授课

核心人物:
  陈百难（法号渡厄）:
    身份: 金刚宗方丈
    修为: 合体中期
    特质:
      - 慈悲面孔: 总是面带微笑，言语温和，看起来像个普通的老和尚。
      - 雷霆手段: 认为"除恶即是扬善"，对于不仅教化的恶徒，会毫不犹豫地物理超度。

  方无尘 (法号灵慧):
    身份: 方丈亲传，当代佛子
    修为: 金丹大圆满
    特质:
      - 先天金刚体: 天生骨骼如精铁，无需修炼便刀枪不入。
      - 杀性深重: 虽修佛法，却不忌杀生。认为自己是地藏王转世，要在地狱中通过杀戮来证道。
      - 极度偏执: 痛恨一切淫邪之事，看到合欢宗女修会忍不住想动杀戒。

  玄难 (罗汉堂首座):
    身份: 宗门第一战力 (除太上长老外)
    修为: 化神初期
    特质:
      - 暴烈如火: 性格极其火爆，一言不合就脱上衣亮肌肉。
      - 护短狂魔: 谁敢欺负金刚宗弟子，他能追杀对方三千里。

宗门地理与设施:
  地理定位:
    区域: 中天域 · 鸣金平原 · 须弥山
    地貌: 此山寸草不生，通体呈赤红色，普通飞剑在此无法飞行。
  整体格局:
    描述: 依山而建，呈阶梯状分布。从山脚到山顶分为四层区域

  区域详解:
    山脚:
      解释: 面向世俗与低阶散修的区域。
      主要设施:
        - 接引广场: 巨大的石板广场，立有一尊百丈高的接引佛像。
        - 铸金坊: 宗门对外出售低阶佛器与开光法宝的店铺。
        - 俗家院: 供前来进香祈福的客人居住

    下层:
      解释: 环境恶劣，是外门磨练心性的地方。
      主要设施:
        - 碎石矿洞: 外门弟子需每日在此徒手开采灵矿，以此磨练力气。但同时，开采获得的灵石，外门弟子可自行处置，宗门不强制回收
        - 铁布巷: 长达十里的上山通道，两侧布满了自动敲击的木人桩与铜锤机关
        - 忏悔崖: 犯错弟子需在此面壁思过

    中层:
      解释: 内门弟子修炼与生活的核心区域。
      主要设施:
        - 十八铜人阵: 位于演武场中央，由十八尊铜人组成，是晋升亲传弟子的必过关卡
        - 罗汉堂: 供奉五百罗汉金身，也是武僧们演练战阵的地方
        - 般若阁: 七层石塔，收藏佛门功法

    顶层:
      解释: 宗门高层居所与圣地
      主要设施:
        - 大雄宝殿: 宏伟殿堂，是宗门议事与举行大典之处
        - 舍利塔林: 历代高僧坐化之地
        - 圣僧院: 方丈与太上长老的清修小院，朴素至极

    后山禁地（镇魔渊）:
      解释: 须弥山背面的深渊，严禁普通弟子和外人进入。
      主要设施:
        - 镇魔塔: 倒插进深渊的九层黑塔，关押着大妖与魔道巨擘。金刚宗亲传弟子会定期进入塔内与妖魔搏杀，进行实战训练。

与外界关系:
  虞王朝:
    关系: 臣服
    描述: 金刚宗镇守中天域西部，抵御兽潮，深得虞王朝器重，被封为"护国神宗"，每年赐下大量物资。

  合欢宗:
    关系: 死敌
    描述: 金刚宗视合欢宗为淫邪魔道，见之必杀

  磐石门:
    关系: 附属
    描述: 磐石门依附于金刚宗，负责为其开采外围的灵石。磐石门弟子亦可前往金刚宗修行
