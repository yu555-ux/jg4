势力名称: 千机阁

基本信息:
  定位: 太虚界第一机关傀儡宗门，中立势力
  核心理念: 巧夺天工，以技入道
  势力评级: 一流上等

修行体系:
  主修功法: 《千机百炼谱》
  体系特点:
    - 傀儡操演: 追求炼制强大的机关傀儡。战斗时，修士只需在远处以神识丝线操控傀儡。
    - 机关阵列: 可调动灵气，自行制作各种连锁机关、陷阱与暗器。
  辅助体系:
    - 天工造物: 门人皆是能工巧匠，不仅擅长制器，更精通木工、雕刻与冶炼

规模与结构:
  组织架构:
    最高权力:
      - 阁主: 统领全阁，掌握核心传承《天工图》。
      - 长老会: 由墨家旁系长辈与外姓大匠师组成，负责辅助决策。
    职能部门:
      - 造办司: 负责制造对外出售的基础机关与法器
      - 神机堂: 专门研发傀儡与大威力攻城器械
      - 影卫营: 负责收集情报
      - 护阁军: 由精锐弟子组成的军队
    人员构成:
      - 墨家嫡系: 掌握最高深的机关术
      - 内门弟子: 可学习墨家部分传承，制作高阶法宝
      - 外门弟子: 可学习基本的机关术

核心人物:
  天机子 (明面阁主):
    身份: 现任阁主，实际上是墨清弦的傀儡
    修为: 表面气息为合体初期
    特质:
      - 完美伪装: 皮肤纹理、须发皆由极品灵材制成，甚至能模拟呼吸与心跳，非大乘期修士神识不可看破。
      - 绝对理智: 按照墨清弦的神识指令行动，行事滴水不漏，威严深沉。

  墨清弦:
    身份: 真正的现任阁主，上代阁主之孙女
    修为: 化神后期 (神识强度堪比合体期)
    特质:
      - 幕后主宰: 极度社恐，厌恶与生人接触，终日躲在密室中钻研机关术，通过操纵"天机老人"来管理宗门。
      - 天纵奇才: 双手极度灵巧，能盲刻微型阵法。认为爷爷传位给自己是因为自己更懂"器之灵"，而非单纯的杀戮。
      - 倾城绝色: 容貌清冷绝美，但常年不修边幅，只有在面对精密的机括时才会露出笑容。

  墨子渊:
    身份: 墨清弦的亲弟，神机堂堂主
    修为: 元婴巅峰
    特质:
      - 激进派: 崇尚"火力至上"，主张制造更大、更具破坏力的战争兵器。认为机关术就是为了杀戮而生。
      - 嫉恨难平: 极度不服气爷爷将阁主之位传给"柔弱"且"不爱露面"的姐姐，认为姐姐是在挥霍宗门的底蕴。

宗门地理与设施:
  地理定位:
    区域: 中天域 · 千机竹海深处
    地貌: 位于千机竹海核心的盆地之中，四周被高达百丈的"铁节灵竹"包围，天然形成了一座巨大的绿色迷宫。
  整体格局:
    描述: 千机阁相当于一个小型城池，所有建筑都悬挂或搭建在灵竹与古木之上，通过无数的滑索、吊桥相连。

  区域详解:
    外环:
      解释: 对外开放的贸易与接待区
      主要设施:
        - 机关飞港: 巨大的木质停机坪，停泊着前来采购的各宗灵舟与商队的机关鸟。
        - 易物坊: 专门出售民用机关（如自动耕犁、灵力马车）与低阶防身傀儡的店铺。
        - 试器场: 一片开阔的空地，供买家现场测试连弩与火炮的威力。

    中环:
      解释: 宗门弟子的制造与生活区
      主要设施:
        - 千火坊: 利用巨大的聚光镜阵引太阳真火，用于冶炼
        - 偃甲林: 林深处为弟子舍，供弟子休息
        - 机关楼: 几栋小型阁楼，供弟子学习

    内环:
      解释: 核心重地，位于“千年亘竹”之上。
      主要设施:
        - 星枢殿: 宗门核心，可操控整个千机阁的机关和阵法
        - 藏图阁: 存放《天工图》和各种设计图纸的密室，布满致死陷阱。

    墨园禁地:
      解释: 位于千年亘竹之根，极为隐蔽
      主要设施:
        - 静思居: 墨清弦的居所
        - 祖师冢: 墨家历代先祖的长眠地，也是“玄机子”平日停放保养的密室。
        - 听竹台: 向外延伸的露台，墨清弦偶尔会在此吹奏竹笛

与外界关系:
  虞王朝:
    关系: 合作
    描述: 虞王朝神策卫手中的"破罡弩"与"轰天雷"皆由千机阁制作。双方虽为买卖关系，但王朝一直试图安插偷取千机阁的各种图纸

  万法宗:
    关系: 合作
    描述: 千机阁的机关需要万法宗的符箓与阵法加持才能发挥最大威力；万法宗的阵法师也需要千机阁的精密器具来布阵。双方经常进行论道交流

  多宝阁:
    关系: 合作
    描述: 千机阁不擅长交易，大部分机关、法宝和阵法都委托多宝阁代理
