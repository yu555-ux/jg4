势力名称: 百兽宗

基本信息:
  定位: 正道中坚/御兽第一宗
  核心理念: 天地万物，灵犀一点
  势力评级: 一流中等

修行体系:
  主修功法: 《万灵御心经》
  体系特点:
    - 灵犀共鸣: 不用强力奴役，而是通过神识与灵兽建立平等契约。心意相通时，可借用灵兽的天赋神通（如鹰眼、龟息、豹速）
    - 兽魂合一: 战斗时可与本命灵兽短暂融合，半兽化以大幅提升肉身强度与爆发力
    - 生命反哺: 人与兽生命共享。灵兽进阶可带动主人突破瓶颈，主人受伤亦可由灵兽分担

  辅助体系:
    - 兽语术: 精通万兽语言，不仅能指挥自家灵兽，亦能安抚或威慑野生妖兽
    - 灵兽培育: 擅长调配兽粮、孵化兽卵及治疗兽伤，是太虚界最大的灵兽贸易商

规模与结构:
  组织架构:
    最高权力:
      - 宗主: 统领全宗，必须拥有一头元婴期以上的本命灵兽
    职能部门:
      - 御兽堂: 教授御兽法门，管理宗门灵兽名册
      - 灵囿司: 负责宗门外围灵兽的喂养、繁育与驯化
      - 巡泽卫: 驾驭飞行灵兽巡视云梦泽，驱逐恶兽，护佑一方水土
      - 兽医馆: 专治灵兽疑难杂症，也对外接诊
      - 杂役堂: 处理杂事、招收弟子、发放任务等
    弟子阶层:
      - 真传弟子: 拥有潜力较强的灵兽，居于核心内岛
      - 内门弟子: 已成功契约本命灵兽，居于中环水榭
      - 外门弟子: 尚未契约本命灵兽，主要负责照料幼兽与杂务

核心人物:
  安定雄:
    身份: 宗主
    修为: 化神初期
    特质:
      - 豪迈: 身形魁梧，声如洪钟，为人仗义疏财。本命灵兽为一头拥有上古血脉的“浊炎冰风”
      - 粗中有细: 虽外表粗犷，但治理宗门井井有条，极重规矩与情义

  陈婉:
    身份: 宗主夫人 / 兽医馆馆主
    修为: 元婴中期
    特质:
      - 仁心: 性格极度温柔，不仅医术高超，更擅长用琴音安抚狂躁的妖兽。本命灵兽为一只通晓人性的“九色鹿”
      - 贤内助: 拓跋雄背后的智囊，处理宗门内务细致入微

  安灵:
    身份: 宗主独女
    修为: 筑基圆满
    特质:
      - 团宠: 宗门上下视若掌上明珠，性格古灵精怪，有些娇蛮但心地善良
      - 天赋异禀: 天生“通灵之体”，能听懂任何动物的心声。伴生灵兽是一只极其罕见的变异“闪电貂”

宗门地理与设施:
  地理定位:
    区域: 中天域 · 南部 · 云梦泽
    地貌: 位于云梦泽的一座小岛上，四周水域环绕，宗门建筑多建于高台或临水而立

  整体格局:
    描述: 呈同心圆布局。最外围是广阔的灵兽活动区，中间是弟子生活区，最核心是宗主大殿。建筑多为白墙黑瓦的江南水乡风格

  区域详解:
    外环区域:
      解释: 灵兽的栖息与放养之地，禁止无关人员进入
      主要设施:
        - 飞禽台: 耸立的高塔群，供飞行灵兽停歇筑巢
        - 走兽林: 一片被阵法圈禁的平原林地，供走兽奔跑嬉戏
        - 水兽湾: 人工港湾，饲养水中灵兽

    中环区域:
      解释: 宗门弟子的主要生活与修炼区
      主要设施:
        - 听涛水榭: 连绵的水上回廊与阁楼，是弟子的居所。每座阁楼旁都设有精致的小型兽栏，供本命灵兽休息
        - 演武广场: 铺设坚硬玄武岩的巨大广场，空间开阔，足以容纳巨兽与人合练
        - 兽医馆总馆: 弥漫着草药香气的建筑群，内设多间诊室与疗养舍

    核心区域:
      解释: 建立在洲岛中央巨大高台之上
      主要设施:
        - 万兽大殿: 宏伟的主殿，地基抬高十丈，俯瞰全洲。殿前立有开派祖师与神兽麒麟的雕像
        - 宗主府: 大殿后方的精致园林，是安定雄一家的居所
        - 藏经阁: 收录天下御兽秘籍，由两只元婴期的“双头狮鹫”日夜看守

与外界关系:
  南泽域各教派:
    关系: 敌视
    描述: 极其反感五毒教、巫神殿等势力利用毒虫蛊物残害生灵的手段，常在边境发生摩擦
  虞王朝:
    关系: 合作
    描述: 为王朝军队提供灵兽，换取王朝对云梦泽水域的部分自主管辖权
  散修盟/多宝阁/赤焰山庄:
    关系: 合作
    描述: 收购妖丹与特殊饲料，同时向对方出售驯化好的灵兽
