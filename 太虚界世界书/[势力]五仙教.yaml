势力名称: 五仙教

基本信息:
  定位: 南泽域最大的毒修宗门
  核心理念: 五毒俱全，悬壶济世
  势力评级: 一流中等

修行体系:
  主修功法: 《五毒真经》
  体系特点:
    - 本命五仙: 每位弟子需选一种毒物作为本命蛊，以精血喂养，人虫共生。
    - 厄难毒体: 通过不断吞噬剧毒来提升修为，身体即是毒源。
    - 白莲净化: 圣女一脉独有的秘术，能将剧毒转化为纯净的生机灵力，用于治疗绝症或驱除心魔。
  辅助体系:
    - 蛊医术: 利用蛊虫吞噬病人体内的病灶或死肉，虽过程痛苦但疗效奇佳。
    - 驭虫术: 能驱使森林中的野生毒虫组成虫潮

规模与结构:
  组织架构:
    最高权力:
      - 教主: 统领全教
      - 五毒长老: 分别掌管蛇仙坛、蝎仙坛等五大分坛。
    职能部门:
      - 药王洞: 负责研制解毒丹与毒药，对外出售换取物资。
      - 育蛊室: 培育高阶蛊虫的密室。
      - 圣莲坛: 圣女居住与修炼的区域，负责净化失控的毒修。
      - 巡林使: 负责万瘴毒林外围的警戒，防止外人误入送死。
    人员构成:
      - 圣女: 地位超然，象征教派的良心与底线。
      - 五仙使: 年轻一代的最强者，各领一坛。
      - 内门弟子: 拥有筑基期本命蛊。
      - 外门弟子: 负责采集毒草与喂养普通蛊虫。

核心人物:
  何青曼 (五毒圣母):
    身份: 现任教主
    修为: 合体初期
    特质:
      - 曾经的罗刹: 早年被情所伤，性格乖戾狠毒，曾毒杀负心汉全族，凶名赫赫。左脸留有一道无法治愈的紫黑色毒疤，那是她修炼禁术留下的痕迹。
      - 现在的慈母: 十八年前捡到弃婴（现在的圣女）后，坚硬的内心被融化。为了积德给女儿祈福，开始约束教众，禁止滥杀无辜，甚至命令弟子救助误入毒林的平民。
      - 护女狂魔: 平日里温声细语，但谁若敢对圣女不敬或动歪心思，她会瞬间变回那个令人闻风丧胆的五毒圣母。

  许清莲 (白莲圣女):
    身份: 圣女 / 教主养女
    修为: 金丹中期
    特质:
      - 净世白莲体: 天生万毒不侵，且血液能解百毒。她的存在本身就是对五仙教剧毒环境的一种净化。
      - 纯善之心: 被何青曼保护得太好，不知世间险恶。经常背着母亲偷偷放走被抓来的“试药人”，或者用自己的血去救治垂死的毒虫。
      - 调和剂: 在教内激进派（主张扩张杀戮）与保守派（主张隐世行医）之间起到微妙的平衡作用，大家都舍不得伤害她。

宗门地理与设施:
  地理定位:
    区域: 南泽域 · 万瘴毒林 · 五毒峰
    地貌: 位于毒林深处的一座五指状山峰。四周被七彩斑斓的瘴气包裹
  整体格局:
    描述: 建筑多为吊脚楼风格，依山而建。。虽然是毒教，但教内种满了白色莲花

  区域详解:
    迷踪寨:
      解释: 五仙教的外围门户，也是对外交易的窗口。
      主要设施:
        - 义诊台: 何青曼设立的免费诊疗点，专门医治疑难杂症，以此改善五仙教的名声。
        - 毒市: 交易各种稀有毒草与蛊虫的集市，规矩森严，禁止黑吃黑。

    五仙坛:
      解释: 五毒长老与弟子的居住区。
      主要设施:
        - 万蛇窟: 深不见底的洞穴，饲养着无数毒蛇，是蛇仙坛弟子的修炼地。
        - 毒液池: 汇聚五毒毒液的池子，弟子需定期浸泡以增强体魄。

    圣莲峰:
      解释: 教主与圣女的居所
      主要设施:
        - 白莲池: 种满了洁白的雪莲。许清莲常在此沐浴修炼。
        - 圣母殿: 何青曼的居所
        - 厄难洞: 关押着何青曼早年炼制的失控毒尸，非教主手令不得入内。

与外界关系:
  百兽宗:
    关系: 关系缓和
    描述: 原本因理念不合而敌对。但自从许清莲多次救治百兽宗受伤的灵兽后，双方关系大幅改善，目前处于互不侵犯状态。

  药王峒:
    关系: 竞争
    描述: 同为南泽用毒行家。药王峒主张以活人试毒，手段残忍；五仙教现在主张以蛊入药。

  虞王朝:
    关系: 疏远
    描述: 王朝曾想招安五仙教为其制作战争毒药，被何青曼以“祖训不可违”为由拒绝。
