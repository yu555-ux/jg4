太虚界_东灵域:
  地理概况:
    位置: 太虚界东部，西接中天域，东临东海，南北分别和南泽域、北寒域的东部地域接壤
    地形特征:
      地形: 整体呈阶梯状分布。西部为接壤中天域的高原，中部为盆地与山脉交错，东部为入海口的冲积平原与群岛
      地貌: 拥有太虚界最复杂的山水地貌，飞瀑流泉遍布，奇峰异石林立，地下溶洞纵横
    气候: 垂直气候明显。山顶终年积雪，山腰四季如春，盆地温暖湿润
    水文: 拥有太虚界最大的水系——云水河，发源于绝云高原，流经整个东灵域注入东海，支流极多
    资源:
      灵气分布: 灵脉众多且活跃，因而东灵域宗门数量最多。
      秘境: 多达上百处，常有上古遗迹出世
      其他资源: 盛产各种灵药、妖丹、矿石
    边界:
      与中天域: 龙脊岭（传闻是烛龙尸骨所化）
      与南泽域: 云瘴区（灵气与毒瘴混合的混乱地带）
      与北寒域: 霜灵海峡（漂浮着无数冰山的海域）
      东部边界: 东海

  北部区域:
    绝云高原:
      位置: 东灵域西北部，地势极高，常年云遮雾绕，是云水河的发源地。
      典型城市:
        云城: 建立在高原上的城邦，终日被云雾笼罩，盛产云雾茶和飞行法器
      主要宗门:
        - 凌霄阁: 正道强宗，主修风雷，阁楼皆悬浮于云端
        - 寒魄门: 亦正亦邪，利用高原寒气修炼神魂，能冻结敌人神识，手段诡秘
        - 星罗宗: 占据高原最高点，参悟星辰，门人多为阵法师
        - 天机阁: 隐世宗门，擅长推演、卜算、八卦，门人稀少但极受尊崇
        - 苦行寺: 苦修佛门分支，僧人赤足行走于冰雪高原，磨练意志与肉身，不修神通只修苦难
      主要地点:
        - 天池秘境: 位于高原最高峰的火山口湖，池水五色，每百年开启一次
        - 雷积山: 终年雷霆不断的高山，山腹中产出雷击木和雷灵石
        - 登云梯: 一条凿在绝壁上的栈道，长达千里，凡人若能走完可直接拜入凌霄阁
        - 葬仙雪原: 高原深处的无人区，传闻有上古大能陨落于此

    断魂峡谷:
      位置: 高原与中部山脉的过渡地带，深不见底的大裂谷。
      典型城市:
        鬼城: 建立在裂谷阴面的集市，是东灵域最大的黑市，鱼龙混杂
      主要宗门:
        - 炼尸宗: 魔道中坚，专门挖掘古修、屠戮修士和平民获取尸体，炼制战尸
      主要地点:
        - 万尸坑: 裂谷底部的天然积尸地，阴气极重，常诞生僵尸
        - 阴风洞: 能够吹散神魂的怪风洞穴，深处生长着养魂草
        - 阴江: 一条从地下暗河流出的黑色河流，据说是冥寂河的分支，同样可通往冥府

  中部区域:
    云霞山脉:
      位置: 东灵域的核心区域，群山连绵，灵气最浓郁之地。
      典型城市:
        霞城: 建立在山脉主峰脚下的繁华大城，每日清晨有紫气东来之景
      主要宗门:
        - 造化道门: 上三宗之一，太虚界最古老的生命道统，主修《造化天经》，掌握起死回生与点化万物之术
        - 青云宗: 古老遗脉，位于山脉外围翠微峰，毫不起眼的小宗门
        - 弈剑阁: 以阵入剑，剑法诡谲多变，如同棋局博弈
        - 散修盟: 分部，位于云水古渡旁。总部位于中天域
        - 五行宗: 专注于五行相生相克的法术，擅长护山大阵的布置
        - 神农教: 专注于培育战斗型灵植，门人随身携带灵种，撒豆成兵，与百草门的温和药理截然不同
        - 影杀楼: 太虚界著名的刺客组织，接手各种暗杀任务，分楼隐藏在四大域
      主要地点:
        - 通天峰: 造化道门驻地，高耸入云，整座山峰被改造成了巨大的聚灵阵
        - 翠微峰: 青云宗所在地，风景秀丽，后山有连通地下灵脉的洗心池
        - 云水古渡: 云水河中游最大的渡口，也是散修交流情报和交易物资的集散地
        - 落凤坡: 一片广阔的平坡，传说有凤凰陨落在此
        - 悟真壁: 一面光滑如镜的巨大山壁，每逢雷雨天会映照出上古大能斗法的影像，可供参悟

    落花盆地:
      位置: 云霞山脉南侧的一个巨大盆地，四季温暖，百花盛开。
      典型城市:
        花都: 全城种满桃花，空气中弥漫着粉色香气，是著名的销金窟
      主要宗门:
        - 合欢宗: 魔门魁首之一，门人皆妖艳美女，擅长采补与双修之术
        - 红袖招: 全员女修的乐舞宗门，常在凡俗与修仙界巡演，实则替合欢宗收集情报
        - 药香谷: 专精炼制媚药、迷药与辅助丹药的小型宗门，依附于合欢宗生存
        - 醉梦楼: 依附于合欢宗的情报组织，开遍东灵域的青楼楚馆，擅长酿造各种灵酒
        - 幻音坊: 不同于听雨轩，主修魔音与幻术，擅长用靡靡之音乱人心智，控制敌人
        - 绝情谷: 全员皆为被情所伤的女子，修绝情道，视合欢宗为死敌，擅长绝情剑法
      主要地点:
        - 极乐宫: 合欢宗总部，建立在巨大的粉色灵玉矿脉上，夜夜笙歌，奢华至极
        - 鸳鸯湖: 盆地中央的双色湖泊，左冷右热，在此双修可事半功倍
        - 迷情林: 环绕极乐宫的桃花林，常年弥漫着催情瘴气，误入者会陷入情欲幻境

    天毒森林:
      位置: 云霞山脉东侧，连接平原的广阔原始森林，常年雾气弥漫。
      主要宗门:
        - 五毒教: 擅长利用森林中的毒虫毒草修炼，与南泽域毒修不同，更偏向于“以毒攻毒”的肉身淬炼
      主要地点:
        - 巨木神庙: 一棵枯死的上古神树内部被掏空建成的神庙，供奉着天毒之神-曲牛天蟒
        - 毒蛛巢穴: 地下洞穴群，盘踞着大量妖蛛，和曲牛天蟒的天敌-森毒妖蛛

  南部区域:
    幽冥裂谷:
      位置: 连接南泽域的险恶地带，地势低洼，常年不见天日。
      主要宗门:
        - 血魔教: 魔道巨擘，以鲜血修炼，性格残暴，擅长血液控制与血遁之术
        - 噬魂殿: 专修神魂攻击的邪派，喜好抽取生魂炼制魂幡
        - 阴煞宗: 利用裂谷深处的地煞之气炼体，肉身阴寒坚硬，与金刚宗的阳刚圣体对立
      主要地点:
        - 血池地狱: 血魔教的禁地，巨大的血水湖泊，不仅腐蚀肉身，更能污秽法宝
        - 幽魂峡: 终日飘荡着冤魂的峡谷，是噬魂殿弟子修炼邪术的天然场所
        - 毒瘴口: 通往南泽域的唯一通道，被厚重的绿色毒瘴封锁

    赤血荒原:
      位置: 幽冥裂谷以西，一片赤红色的荒凉土地，寸草不生。
      主要宗门:
        - 铁血盟: 由体修组成的激进组织，以猎杀魔修为生，行事风格刚硬，修炼战阵之术
      主要地点:
        - 陨铁坑: 一个巨大的陨石坑，散落着天外陨铁
        - 煞气泉: 地下喷涌而出的煞气泉眼，魔修在此修炼魔功事半功倍

    腐败沼泽:
      位置: 幽冥裂谷以东，靠近南泽域边界，充满了腐烂的气息。
      主要地点:
        - 尸香魔芋田: 一片生长着巨大食人花的区域，散发着诱人的异香
        - 沉船墓地: 沼泽深处的一片泥潭，吞噬了无数误入的飞舟

  东部区域:
    沧澜平原:
      位置: 东灵域东部的冲积平原，水网密布，直通东海。
      典型城市:
        海州: 巨大的港口城市，也是太虚界最大的海产与海外奇珍交易中心
      主要宗门:
        - 蓬莱: 隐世宗门，不参与正魔争锋
        - 皇浦世家: 拥有稀薄龙族血脉的古老家族，擅长龙化秘术，镇守海州
      主要地点:
        - 归墟: 位于东海深处的巨大漩涡，吞噬一切靠近的船只，传闻连通着海底龙宫
        - 观海台: 矗立在海边的千丈高台，是观摩潮汐、感悟水系法则的最佳地点
        - 水晶宫: 每月初五夜晚潮落，可见一座水晶宫浮于海上，但始终无人抵达

    惊涛群岛:
      位置: 沧澜平原以东的深海区域，常年被风暴和雷霆笼罩。
      主要地点:
        - 雷池: 岛屿中心的一座天然雷电汇聚之地，雷液可淬体
        - 风暴角: 群岛最东端的海角，风暴最猛烈之处
        - 碎星滩: 散落着无数发光矿石的海滩

    珊瑚骨林:
      位置: 沧澜平原东南侧的浅海区域，海底遍布巨大的骨状珊瑚。
      主要地点:
        - 白骨圣殿: 一座完全由白骨生长而成的宏伟建筑，据说是某个魔道大能的遗址
        - 幻彩海沟: 一条散发着七彩光芒的海沟，光芒能迷惑心智
