太虚界_南泽域:
  地理概况:
    位置: 太虚界南部，地势低洼，状如盆地，汇聚四方浊气
    地形特征:
      地形: 以盆地和湿地为主，地势低洼
      地貌: 沼泽、泥潭、森林、瘴气谷、地下溶洞交织
    气候: 终年湿热，雨季漫长，阳光难以穿透森林和瘴气
    水文: 水系混乱，多死水、毒水，地下暗河发达，水位随季节剧烈变化
    资源:
      灵气分布: 灵气中混杂着剧毒与瘴气，普通修士吸收缓慢
      其他资源: 盛产各种毒虫、毒草、尸炼材料、巫蛊之物、矿物毒
    边界:
      与中天域: 万瘴泽（云梦泽最深处）
      与东灵域: 云瘴区
      与西妖域: 毒妖荒原

  北部区域:
    万瘴毒林:
      位置: 南泽域北部，连接中天域，是进入南泽域的天然屏障。
      典型据点:
        千户寨: 建立在巨大榕树群上的联合寨子，由七十二个小寨组成，排外但对外交易毒草
      主要教派:
        - 五仙教: 供奉蛇、蝎、蜈蚣、壁虎、蟾蜍五毒，擅长炼制本命蛊
        - 药王峒: 擅长以活人试毒炼药，医毒不分家
      主要地点:
        - 瘴气天坑: 巨大的地陷坑，内部瘴气呈七彩之色，坑底生长着绝世毒药
        - 蛇盘山: 形状如盘蛇的山峰，内部被掏空，饲养着无数毒蛇
        - 迷魂凼: 一片移动的树林，树木会根据五行方位自行移动
        - 毒龙潭: 一口深不见底的绿水潭，传闻潭底沉睡着上古毒龙的尸骸

    蚀骨荒丘:
      位置: 万瘴毒林以西，一片风化严重的岩石丘陵，寸草不生。
      典型据点:
        石寨: 用含毒岩石堆砌而成的寨子，居民多患石皮病，皮肤坚硬如铁
      主要地点:
        - 瘴风峡: 峡谷中常年刮着带有毒风，能瞬间将血肉吹成白骨
        - 化骨池: 一口翻滚着黄色泡沫的泥浆池，任何生物落入其中都会化为脓水
        - 蝎王洞: 巨型毒蝎的巢穴，洞内遍布蝎卵，是五仙教弟子的试炼地
        - 荒冢群: 乱石堆下的古墓群，埋葬着上古毒修，常有毒尸爬出

  中部区域:
    大荒湿地:
      位置: 南泽域的核心区域，泥潭遍布，寸步难行。
      典型据点:
        黑水城: 建立在几块巨型浮石上的城市，是南泽域最大的交易中心
      主要教派:
        - 赶尸派: 承接替人运送尸体回乡，暗中炼制铜甲尸、飞天尸
        - 泥黎教: 崇拜污泥与腐烂，常将活人沉入泥潭献祭
      主要地点:
        - 尸王殿: 隐藏在湿地深处的地下宫殿，疑似有旱魃在此沉睡
        - 腐骨沼泽: 一片白色的沼泽，泥浆下埋葬着无数枯骨
        - 鬼市: 每逢月缺之夜在水面上出现的集市，交易货币为寿命、器官或生魂
        - 沉尸河: 一条流速极缓的浑浊河流，河面上常年漂浮着浮尸

    九曲鬼域:
      位置: 大荒湿地地下，庞大的地下河溶洞系统，阴暗潮湿。
      典型据点:
        幽冥水寨: 建立在地下暗河两岸的悬棺之上的寨子，居民终生不见阳光
      主要教派:
        - 水鬼帮: 擅长水下闭气和操纵水鬼，负责地下河的运输和劫掠
      主要地点:
        - 鬼哭洞: 洞内钟乳石形状诡异，风过时发出凄厉哭声，能震碎凡人心魂
        - 阴河渡: 地下河的一处渡口，摆渡人只收死人钱（冥币或祭品）
        - 盲鱼渊: 生活着巨大盲鱼的深渊，盲鱼肉质鲜美但含有尸毒
        - 悬棺崖: 地下溶洞的峭壁上悬挂着数万具棺木，是赶尸派养尸的场所

  南部区域:
    巫峡群山:
      位置: 南泽域南部，十万大山连绵起伏，原始而神秘。
      典型据点:
        蛮王寨: 统领南部各个蛮族部落的中心寨子，民风彪悍
      主要教派:
        - 巫神殿: 供奉巫神，掌握着神秘的萨满通灵术和诅咒术
        - 兽灵门: 擅长与野兽沟通，将兽魂封印入体通过“请神”获得力量
      主要地点:
        - 祭神台: 位于最高峰顶的巨大石台，常年燃烧着不灭的兽脂火
        - 祖灵洞: 供奉历代大巫师干尸的洞穴，擅入者会受到恶毒诅咒
        - 虫谷: 一个封闭的山谷，谷内只有无尽的虫海，是炼制蛊王的禁地

  东部区域:
    死魂浊域:
      位置: 连接东灵域的区域，死气沉沉，阴森恐怖。
      典型据点:
        白骨寨: 完全用妖兽和人类骨骼搭建的寨子，居民多为半人半尸
      主要教派:
        - 阴煞宗（南泽分舵）: 专门收集战场煞气和死气
        - 炼魂部落: 以折磨灵魂为乐的食人部落
      主要地点:
        - 养尸地: 一块天然形成的极阴之地，尸体埋入其中七日可尸变
        - 聚魂幡阵: 由上万面破损魂幡组成的阵法，常年锁住数万冤魂
        - 血肉磨坊: 一座巨大的血肉祭坛，外形如同磨盘
        - 冥火光原: 日夜燃烧着绿色鬼火的平原，鬼火会追逐活物

    极阴尸地:
      位置: 死魂浊域以北，靠近幽冥裂谷，阴气最重之地。
      典型据点:
        棺材铺: 一个巨大的聚落，家家户户以打棺材为生，也出售各种尸体防腐材料
      主要教派:
        - 尸傀宗: 擅长将活人炼制成尸傀，保留生前意识但无法控制身体
      主要地点:
        - 积尸岭: 堆满尸体的山岭，每逢雷雨夜会有天雷劈尸，诞生僵尸
        - 阴阳界碑: 一块古老的石碑，划分生人与死者的界限，越过界碑者生气流失。疑似在界碑深处也可以通往冥界。
        - 尸油河: 一条粘稠发黑的河流，散发着恶臭，河面燃烧着不灭的尸火
