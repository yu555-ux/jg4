势力名称: 万法宗

基本信息:
  定位: 正道上三宗之一
  核心理念: 法无定法，万流归宗；有教无类，兼容并蓄。
  势力评级: 顶级

修行体系:
  主修功法: 《万象森罗经》
  体系特点:
    - 共十二个招式
    - 五行流转: 可借五行规律，令修行者施展出与自己灵根属性不同的法术，在五行之间自由运转
    - 万法洪流: 可在战斗时瞬间释放成百上千个法术，
  辅助体系:
    - 仙艺精通: 宗门鼓励弟子修习炼丹、炼器、阵法、符箓、御兽、灵植等修仙百艺

规模与结构:
  组织架构:
    最高权力:
      - 万法道庭: 由宗主与十八位掌殿长老组成
    职能部门:
      - 传道殿: 负责向全宗弟子传授基础法术，不设门槛
      - 天工司: 统管丹、器、阵、符等修仙资源的生产与分配
      - 刑律堂: 负责宗门纪律，追捕叛徒与违反门规者
      - 鸿胪寺: 专门处理对外贸易、附属宗门朝贡及凡俗事务
    人员构成:
      - 真传弟子: 掌殿长老亲传，可修习《万象森罗经》核心篇章
      - 内门弟子: 筑基期以上，选定某一主修方向的弟子
      - 外门弟子: 数量庞大，达数十万之众，修习基础五行法术
      - 记名弟子: 缴纳灵石即可挂名听课的散修或世家子弟，不计其数

核心人物:
  李玄机 (万法真君):
    身份: 宗主
    修为: 大乘初期
    特质:
      - 道法自然: 精通上万种法术，号称"万法通天"，出手时天地变色。
      - 绝对中立: 在正魔之争中往往扮演调停者的角色，只维护宗门利益。

  司徒浩:
    身份: 真传弟子
    修为: 元婴中期
    特质:
      - 术法炮台: 天生灵脉宽阔，灵气储备是同阶修士的十倍。战斗时不动如山，仅凭无穷无尽的火球术、冰锥术便能淹没对手。
      - 沉稳: 负责统筹内门弟子事务，威望极高。

  纳兰若水:
    身份: 真传弟子
    修为: 元婴初期
    特质:
      - 水木双修: 擅长治疗与防御法术，性格温柔如水，是宗门内无数男修的梦中道侣。
      - 医者仁心: 常在翡翠平原义诊，与百草门关系极佳。

  叶红鱼:
    身份: 真传弟子
    修为: 金丹大圆满
    特质:
      - 阵符双绝: 不喜修习传统攻击法术，而是将阵法刻于符箓之上。战斗时撒出一把符箓，瞬间布下杀阵。
      - 古灵精怪: 喜好研制各种稀奇古怪的小玩意，常炸毁炼器房。

宗门地理与设施:
  地理定位:
    区域: 中天域 · 翡翠平原中部
    地貌: 位于平原腹地，依托灵脉而建。宗门没有围墙，而是以巨大的阵法光幕笼罩方圆百里。
  整体格局:
    描述: 呈"回"字形布局。最外层是繁华的修仙集镇，中间是五行分院，核心是道宫。

  区域详解:
    外环（万仙集镇）:
      解释: 宗门最外围的开放区域，也是中天域最大的修仙者交易市场。
      主要设施:
        - 散修坊市: 众多店铺与地摊，允许任何正道修士在此交易，万法宗只收税维持秩序。
        - 迎仙馆: 接待外来访客与记名弟子的大型驿站群。
        - 登云台: 白玉广场，是每年招收新弟子的测试场地。

    中环（五行道院）:
      解释: 宗门弟子修炼与居住的主区域，按五行方位划分为五个扇形区。
      主要设施:
        - 庚金院 (西): 主修金系法术与炼器
        - 乙木院 (东): 主修木系法术
        - 葵水院 (北): 主修水系法术
        - 离火院 (南): 主修火系法术与炼丹
        - 戊土院 (中): 主修土系法术

    内环:
      解释: 位于五行道院与核心区之间，是宗门副职技艺的集中地。
      主要设施:
        - 演法大坑: 一个直径十里的斗法场，布有强力禁制，供弟子切磋。
        - 藏经圣殿: 一座宏伟的九层宫殿，收藏着海量的法术典籍与修仙杂记。

    核心（道宫）:
      解释: 立于大地上的宏伟宫殿
      主要设施:
        - 万法大殿: 宗主与长老议事的主殿
        - 祖师祠堂: 供奉历代祖师牌位，也是护宗大阵的阵眼。
        - 真传洞府: 围绕主殿的几个小型建筑，是真传弟子的居所。

与外界关系:
  太虚仙宗/造化道门:
    关系: 合作竞争
    描述: 同为正道巨擘，面对魔道和妖兽联合，在招收弟子上呈欣欣向荣之竞争

  虞王朝:
    关系: 合作
    描述: 万法宗是虞王朝最大的阵法师与炼器师来源地。王朝的护城大阵、法器多出自万法宗之手

  百草门/流云宗/青木谷:
    关系: 依附
    描述: 这三个势力完全依附于万法宗，但不必上缴灵石，只需替万法宗维护平民安全即可。同时，这三个宗门的弟子也可自行前往万法宗学习
