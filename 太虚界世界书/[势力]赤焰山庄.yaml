势力名称: 赤焰山庄

基本信息:
  定位: 太虚界最大的基础法器与丹药售卖庄，以“量大、价优、结实”著称的家族式宗门
  核心理念: 匠心铸火，惠泽天下；不求件件传世，但求物物实用


修行体系:
  主修功法: 《赤明离火经》
  功法特点:
    - 炉火纯青: 修炼出的火焰温和稳定，最适合长时间炼器炼丹，非杀伐之火
    - 薪火相传: 家族血脉传承，族人可互相借火助势，联手时控火能力倍增
    - 铜皮铁骨: 常年受地火烘烤与淬炼，门人肉身强横，不输体修

  辅助体系:
    - 千锤百炼术: 特殊锻造技艺，能将凡铁锻造成堪比下品灵材的器胚
    - 分心控火法: 核心族人必修，能同时操控数十个炼器炉，实现大量炼制

规模与结构:
  组织架构:
    最高权力:
      - 庄主: 祝家家主，拥有绝对话语权
      - 长辈: 由旁系长辈与客卿长老组成，负责监督与决策

    职能部门:
      - 铸兵堂: 负责批量炼制制式法器，营收支柱
      - 灵草堂: 负责种植灵草与炼制基础丹药
      - 商路司: 负责组建商队，将产品运往四域
      - 护庄卫: 负责守护商路与矿脉

    人员构成:
      - 嫡系族人: 掌握核心秘术
      - 外姓学徒: 招募自寒门或散修，表现优异可赐姓
      - 客卿供奉: 痴迷炼器的散修大师，赤焰山庄提供顶级地火与材料供其挥霍，换取其庇护

核心人物:
  祝融山:
    身份: 现任庄主/火云城主旧识
    修为: 元婴后期
    特质:
      - 宽厚长者: 毫无架子，常穿粗布麻衣，对学徒极有耐心
      - 实业家: 务实，坚持薄利多销，鄙视多宝阁的虚浮作风
      - 护犊子: 脾气温和但触及底线（子女或商队）必亲手报复

  祝天养:
    身份: 少庄主 (长子)
    修为: 金丹后期
    特质:
      - 稳重干练: 负责日常经营与商路，口碑极佳
      - 守成之主: 行事滴水不漏，缺乏开拓性
      - 兄长风范: 极度宠溺妹妹

  祝灵儿:
    身份: 庄主爱女 (次女)
    修为: 筑基大圆满
    特质:
      - 器道天才: 天生火灵体，常有天马行空的炼器点子
      - 活泼娇憨: 喜欢混在学徒堆里打铁，被称为“黑炭仙子”
      - 正义感: 继承父亲热肠，爱拔刀相助

宗门地理与设施:
  地理定位:
    区域: 中天域 · 流火原 · 火云城（北区）
    地貌: 火云城依“紫炎山”而建，赤焰山庄占据了城市靠近火山口的整个北半部，与南部的城主府及居民区隔街相望。

  整体格局:
    描述: 山庄拥有独立的赤岗岩围墙，内部引地下的“阴阳双火”。分为对外开放的前庄、核心炼制的中庄和家族禁地的后庄。

  区域详解:
    前庄 (交易与展示):
      解释: 面向火云城开放的区域。
      主要设施:
        - 赤焰商行: 山庄最大的门面，展示、交易最新法宝、丹药。
        - 地火房: 位于前庄边缘，出租给散修的廉价炼器和炼丹室。

    中庄 (炼制核心):
      解释: 严禁外人进入的作坊区
      主要设施:
        - 铸兵堂: 数百座熔炉同时运作的壮观场面，大量炼制法宝、兵器。
        - 灵草堂: 利用地火控制室温的炼丹区
        - 库房重地: 储存大量灵材与成品的仓库，有重兵把守。

    后庄 (家族禁地):
      解释: 紧邻火山口，祝家嫡系生活与修炼之所。
      主要设施:
        - 万火熔炉: 悬空于火山口之上的巨大熔炉，引阴阳双火，专炼高阶法宝。
        - 百草室: 种植珍稀灵药，可炼制高阶药草。
        - 祝府: 庄主与族人的居所，朴实无华，但防御阵法极强。

与外界关系:
  火云城主府:
    关系: 世代交好
    描述: 城主与祝融山是生死之交，城主府负责城市治安与税收，山庄负责繁荣经济。

  多宝阁:
    关系: 竞争者
    描述: 互相鄙视。赤焰山庄占据底端法宝、武器的市场，多宝阁占据高端市场。

  散修盟:
    关系: 盟友
    描述: 赤焰山庄是散修盟最大的装备供应商，且常年招募散修护卫。散修盟成员在赤焰山庄购买法器可享优惠

  虞王朝:
    关系: 装备供应
    描述: 龙旗军和神策卫装备的主要来源，祝融山受封“紫金光禄大夫”，但保持中立。
