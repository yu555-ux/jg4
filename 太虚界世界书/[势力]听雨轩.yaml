势力名称: 听雨轩

基本信息:
  定位: 中天域最负盛名的全女修宗门，音律与水法的圣地
  核心理念: 以音入道，以色娱人，以势护身

修行体系:
  主修功法: 《清音流水谱》
  功法特点:
    - 音波乱神: 将灵力融入琴音、萧声之中，无形无质，可大范围干扰敌方心神，甚至引发内魔
    - 水幕天华: 极强的群体防御手段，能凝聚湖水化为结界，化解刚猛攻击
    - 润物无声: 顶级的群体治疗与辅助功法，能通过音律安抚狂暴的灵气，辅助高阶修士突破瓶颈

  辅助体系:
    - 驻颜术: 轩内秘传，不仅能让容颜永驻，更能随着修为提升不断优化气质，修至高深处自带天然魅惑
    - 七窍玲珑心: 专门修炼察言观色与人情世故的心法，能敏锐感知他人的情绪波动与欲望

规模与结构:
  组织架构:
    最高权力:
      - 轩主: 统领全宗，负责在大势力间周旋

    职能部门:
      - 霓裳宫: 负责弟子的礼仪、才艺与妆容培训，是核心弟子的选拔地
      - 妙音坊: 专门钻研音律杀伐之术，是宗门的护法力量
      - 结缘台: 负责处理宗门弟子的联姻事宜，审核男方背景资质
      - 浣纱局: 负责处理杂务与收集情报，门下弟子多以侍女身份潜伏在各大城池

    弟子阶层:
      - 圣女（一人）: 宗门门面，必须保持处子之身，除非遇到足以改变宗门命运的联姻对象
      - 亲传弟子（十二人）: 轩主与长老亲传，色艺双绝，多为各大家族争抢的道侣人选
      - 内门弟子: 修为筑基以上，才艺出众，可代表宗门外出历练或表演
      - 外门弟子: 负责打理宗门杂务，也是听雨轩对外情报网的基石

核心人物:
  柳倾雪 (天音仙姬):
    身份: 现任轩主
    修为: 合体初期
    特质:
      - 八面玲珑: 曾是太虚仙宗某位太上长老的红颜知己，独自撑起听雨轩
      - 深不可测: 外表温婉柔弱，实则心机深沉，掌握无数高阶修士的把柄
      - 护短: 极其厌恶始乱终弃的男人，若弟子被欺辱必让对方身败名裂

  苏浅浅:
    身份: 当代圣女
    修为: 金丹巅峰
    特质:
      - 绝世容颜: 中天域美人榜首，被誉为"仙宫遗珠"
      - 琴心剑胆: 主修杀伐音律《广陵止息散》，琴音可杀人于无形
      - 高冷: 不屑垂涎美色的男人，渴望真正的强者

宗门地理与设施:
  地理定位:
    区域: 中天域 · 镜天湖群 · 听雨岛
    地貌: 一座悬浮在湖面的仙岛，终年被灵雨笼罩，遍植湘妃竹与垂丝海棠。每当夜幕降临，岛上灯火通明，丝竹之声不绝于耳。

  整体格局:
    描述: 岛屿呈弯月形，分为外环迎客区、中环生活区和内环幽禁区。建筑多为精巧的竹楼与水榭，以回廊栈道相连，不沾泥土。

  区域详解:
    外环前岛:
      解释: 对外开放的社交区域，是中天域修士最向往的销金窟。
      主要设施:
        - 渡情码头: 岛屿唯一的入口，停靠着各色奢华画舫
        - 知音阁: 一座五层高的八角水楼，收藏天下乐谱名琴，也是举办大型雅集、接待贵客的主场地。
        - 留香水榭: 沿湖岸修建的半开放式茶楼群，供访客品茶听曲，等待佳人垂青。

    中环中岛:
      解释: 宗门弟子的生活与核心职能区。
      主要设施:
        - 霓裳宫: 位于花海中央的宫殿群，负责弟子的才艺与妆容培训，终日莺歌燕舞。
        - 结缘台: 一座悬空的红木高台，专门用于审核联姻对象与举办结道大典。
        - 十二钗绣楼: 围绕霓裳宫分布的十二座精致独栋小楼，为亲传弟子居所，风格各异。
        - 浣纱局: 隐蔽在竹林深处的朴素院落，负责处理情报与杂务。

    内环后岛:
      解释: 宗门核心传承与禁地。
      主要设施:
        - 听雨小筑: 轩主柳倾雪的居所，是宗门权力的核心。
        - 妙音坊: 也是刑罚堂所在地，不仅钻研杀伐音律，地下还设有水牢关押负心汉与叛徒。
        - 洗心亭: 位于后山湖心的一座孤亭，四面环水，在此弹奏可引动湖水共鸣，洗涤道心。
        - 断肠崖: 位于后岛深处的悬崖，崖下风声如泣如诉，是修炼悲情音律的绝佳场所，也是禁地。

与外界关系:
  虞王朝:
    关系: 皇家御用
    描述: 听雨轩是宫廷乐师主要来源，柳倾雪被封为"诰命夫人"，常在国宴献艺。

  多宝阁:
    关系: 合作
    描述: 多宝阁拍卖会常聘请听雨轩弟子表演或作为侍者。
