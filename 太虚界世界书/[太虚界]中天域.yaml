太虚界_中天域:
  地理概况:
    位置: 太虚界中心区域，连接东灵域、南泽域、西妖域、北寒域
    地形特征:
      地形: 中心为玉霄山，四周以平原为主，地势从中心向四周降低
      地貌: 中天域的南方有天遣裂谷，谷深不见底
    气候: 四季分明
    水文: 九曲江发源于玉霄山下，呈对称辐射状流向正东、正西、正南和正北，分支较多，最终分别注入四域
    资源:
      灵气分布: 整体中间多四周稀少，但中天域北方有虞王朝首都洛阳，因而洛阳附近灵气也较多
      其他资源: 盛产灵石
    边界:
      与东灵域: 龙脊岭（传闻乃烛龙渡劫死亡而化）
      与南泽域: 万瘴泽（云梦泽的最深处）
      与西妖域: 玄铁长城（虞皇徭役修士、平民筑建而成，抵御妖兽进攻）
      与北寒域: 冥寂河（传闻可通冥府）

  北部区域:
    白玉京:
      位置: 中天域与北寒域接壤处，冥寂河水气与暖阳交汇，云雾缭绕。
      典型城市:
        云州: 建立在烟波泽之上，建筑多为高脚楼，是北行商旅的必经节点
      主要宗门:
        - 玄水宫: 修炼阴寒功法，落魄宗门
        - 泅水阁: 白玉京最大的宗门 
      主要地点:
        - 寒泉之眼: 终年吞吐微凉泉水的巨型湖，深不见底。传说湖底为无水之地，为九阴女帝之冢
        - 烟波泽: 芦苇丛生的广阔水域，多水上城邦
        - 听风筑: 紧邻冥寂河，镇国府驻扎地

    朔风原:
      位置: 白玉京以南，地势较高，常年刮着来自北寒域的罡风。
      主要宗门:
        - 狂刀门: 常接受护送商队的任务
      主要地点:
        - 风吼谷: 地形如喇叭口的峡谷，风声如雷。
        - 枯石林: 被罡风雕刻成怪异形状的石林。内部迷宫错综复杂，藏有秘宝
        - 猎风营: 专门捕猎妖兽的修士营地。收购妖丹等，价格公道，提供简易住宿

    圣虞平原:
      位置: 朔风原以南，地势平坦，土地肥沃，是虞王朝的核心腹地。
      典型城市:
        洛阳: 虞王朝首都，紫气东来，气运汇聚之地
      主要宗门:
        - 浩然书院院: 虞王朝官方设立的学府，为中天域最知名的儒家学院
      主要地点:
        - 九龙运河: 围绕洛阳的九条人工河。
        - 封神祭台: 位于平原中央的巨型五色土坛，虞帝每年二月初一在此举行祭天大典

  中心区域:
    玉霄山:
      位置: 中天域乃至全界的中心，通天巨峰。
      典型城市:
        天都: 位于玉霄山腰的浮空石群上，居民皆为修士
      主要宗门:
        - 太虚仙宗: 占据六座主峰，正道领袖
      主要地点:
        - 凌云顶: 玉霄山的最高峰，常年处于金色的雷云包围中
        - 悟道崖: 面向云海的绝壁，留有无数太虚仙宗前辈的仙道感悟。即对宗门弟子开放，也对散修开放
    聚灵丘陵:
      位置: 玉霄山根基处的一圈低矮丘陵，灵脉分支众多。
      典型城市:
        道城: 环绕丘陵而建的八卦形城市
      主要宗门:
        - 多宝阁: 在东灵域、南泽域和中天域都有分阁，行交易、拍卖之事，和赤焰山庄处于竞争合作的状态
        - 散修盟: 建立在万灵坪附近的组织。提供廉价的情报贩卖、组队中介和洞府租赁服务
      主要地点:
        - 万灵坪: 丘陵中央的一块天然白玉广场，太虚仙宗的几位峰主每隔三月，于初五在此开坛讲法
        - 问道碑林: 散布的古老石碑群。部分石碑残缺，需用神识修补，修补成功可获得碑中藏匿的功法残篇

    镜天湖群:
      位置: 玉霄山东侧，地势低洼，汇聚了从山上流下的灵泉。
      主要宗门:
        - 听雨轩: 全员女修，擅长水系法术与音律，常受邀在各大庆典演奏
      主要地点:
        - 映月潭: 每逢月圆之夜，潭底会生出月光精华，阴灵气浓度上升
        - 龙鱼湾: 盛产灵智龙鱼。严禁捕捞，但可以购买特制鱼食喂养，若龙鱼跃出水面，预示近期运势大吉

  南部区域:
    流火原:
      位置: 玉霄山以南，地壳薄弱，火灵气躁动。
      典型城市:
        火云: 依山而建的赤红色城市，全城用地火供暖，炼器师和炼丹师云集
      主要宗门:
        - 赤焰山庄: 南部最富有的修仙家族，擅长火系功法、炼丹与练气。在东灵域、中天域、南泽域皆有分庄
        - 地火门: 依附于赤焰山庄，专门负责开采低阶火灵石和炼制民用法器
      主要地点:
        - 地龙眼: 直通地底岩浆的巨大地穴，常年喷涌精纯火灵气，岩浆深处有异火生长
        - 炎晶矿: 流火原深处的露天矿脉，盛产火系灵石，由地火门和赤焰山庄把守

    天遣裂谷:
      位置: 流火原以南，传闻是上古剑仙与魔祖激战时的一缕剑气不小心掉落在地上所致。
      主要宗门:
        - 天剑门: 太虚界第一剑修宗门，建筑悬挂在裂谷峭壁上
      主要地点:
        - 渊剑冢: 裂谷深处的葬剑之地，有天剑门修士和前辈之亡剑

    云梦泽平原:
      位置: 天遣裂谷以南，连接南泽域的过渡区域，湿气重。
      典型城市:
        江陵: 建立在云梦泽平原上的城市，入南泽前的最后补给站
      主要宗门:
        - 百兽宗: 擅长驱使妖兽、灵兽，常在泽中充当向导
      主要地点:
        - 枯木寨: 由流亡修士建立的水上营地。鱼龙混杂，只要给钱就能买到各种物品
        - 梦隐岛: 随着水位变化时隐时现的小岛，传说岛中有“大梦真妄浮生天尊”建筑的庙宇，可通仙宫

  东部区域:
    翡翠平原:
      位置: 玉霄山之东，降水充沛，草木茂盛。
      典型城市:
        扬州: 水网密布，河道中流淌着淡淡药香，草药集散地
      主要宗门:
        - 万法宗: 上三宗之一，传授面最广
        - 百草门: 依附于万法宗，专注于灵药培育，掌控着平原七成的药园
        - 流云宗: 依附于万法宗，擅长风系法术，承接了翡翠平原大部分的草药护送业务
        - 青木谷: 依附于万法宗，种植低阶灵米和饲灵草，门人多为木灵根资质一般的修士
      主要地点:
        - 药王谷: 隐藏在深处的独立山谷，谷深处有大量稀有药草。
        - 散修集市: 位于扬州城外的露天市场。

    千机竹海:
      位置: 翡翠平原深处，铁竹成林。
      典型城市:
        锦城: 隐藏在竹海中，城墙由千机阁帮助建筑而成
      主要宗门:
        - 千机阁: 擅长制造机关、傀儡
      主要地点:
        - 翠竹迷宫: 天然竹林阵法，内部秘境暂无人进入，传说是青帝的坐化之地
        - 听笋轩: 竹海深处的一座雅致茶楼

    龙息阶梯:
      位置: 最东侧过渡区域，地势层层拔高。
      典型城市:
        青州: 建立在阶梯状山体上的城市，层层叠叠
      主要宗门:
        - 御风门: 流云宗的兄弟宗，负责阶梯各层之间的信件传递
      主要地点:
        - 云梯栈道: 修建在绝壁上的栈道，连接各个阶梯层级，险峻异常
        - 龙吟洞: 位于山体内部的孔洞，风过时发出龙吟声。据传其内部乃陨龙地

  西部区域:
    鸣金平原:
      位置: 玉霄山以西，土地坚硬，矿产丰富。
      典型城市:
        凉州: 风格粗犷的城市，城墙由黑铁浇筑，终日回荡打铁声
      主要宗门:
        - 金刚宗: 中天域最大的佛宗，多炼体
      主要地点:
        - 碎星矿道: 深入地底万丈的坑道，产出多种矿物
        - 神兵炉: 借地火引流而建的巨型公共熔炉。租用熔炉需排队，旁边有“试刀石”供炼成的法宝当场测试威力

    乱石岗:
      位置: 鸣金平原西侧，怪石嶙峋，植被稀少。
      典型城市:
        肃州: 建立在风蚀岩群中的要塞，抵抗西妖域兽潮的后勤基地
      主要宗门:
        - 磐石门: 擅长土系法术
      主要地点:
        - 石林阵: 天然形成的迷阵。阵眼中生长着土灵芝，但也潜伏着擅长伪装的岩石傀儡
        - 怪石堡: 散修利用巨大岩石掏空建成的简易洞府群，是亡命之徒的藏身所

    落日戈壁:
      位置: 最西侧过渡区域，连接西妖域，黄沙漫天。
      典型城市:
        沙州: 建立在绿洲旁的小城，常有贩卖妖兽材料的商队停留
      主要地点:
        - 玄铁长城: 绵延万里的黑色长城。每隔百里设有“战功碑”，记录将士的击杀妖兽数量，凭战功可兑换军需物资
        - 黄沙客栈: 戈壁中唯一的补给点。
        - 流沙河: 一条由流沙组成的河流，无法渡舟，河流中有巨型嗜沙蠕虫
