太虚界_西妖域:
  地理概况:
    位置: 太虚界最西部，地域广阔，但绝大多数为不适合凡人生存的绝地
    地形特征:
      地形: 整体呈现中间高、四周低的趋势，万兽山脉贯穿南北
      地貌: 多为沙漠、火山、雷原、冻土等
    气候: 极端恶劣，常有灵气风暴
    水文: 水源稀缺，多为地下暗河或热泉
    资源:
      灵气分布: 万兽山脉最多
      特产: 高阶妖丹、神兽真血、伴生灵矿、上古遗骸
    边界:
      与中天域: 玄铁长城
      与北寒域: 寒妖冻土
      与南泽域: 霜灵海峡

  中部区域:
    万兽山脉:
      位置: 横跨西妖域的南北，灵气最浓郁之地
      主要遗迹:
        - 祖血池: 位于妖皇城深处，汇聚万妖精血，每十年开启一次
        - 妖帝冢: 历代妖皇的长眠之地，位于帝宫深处
      主要地点:
        - 妖皇城: 建立在万兽山脉之上，通天彻地的妖神柱林立
        - 帝宫: 妖皇东皇溟的住所
        - 万灵碑: 天然黑色巨碑，镌刻历代妖域强者真名
        - 斩灵台: 位于皇城广场中央的巨大刑台，染血呈暗紫色，专门处决叛逆的高阶妖兽

    龙凤天渊:
      位置: 万兽山脉最高段，妖域禁地，云雾常年呈金红色。
      主要遗迹:
        - 真龙巢: 位于万兽山脉最顶端，四周雷霆环绕
        - 梧桐神木: 枯死又重生的参天巨木，终年燃烧南明离火
      主要地点:
        - 葬龙谷: 遍地龙骨的峡谷，土地浸透龙血，生长龙血草
        - 龙息云海: 环绕天渊的云层，蕴含真龙吐息，凡妖吸入可强健体魄
        - 涅槃原: 梧桐神木下方的一片灰色平原，虽是灰烬却生机勃勃，生长着不死草

    万妖血路:
      位置: 环绕万兽山脉外围的环形地带，通往妖皇城的必经之路。
      主要遗迹:
        - 斗战圣殿: 上古好战大妖留下的遗迹，充满了各种试炼和考验
      主要地点:
        - 埋骨荒野: 堆满失败挑战者白骨的荒野，煞气凝结成雾
        - 试炼关隘: 天然形成的隘口，常有高阶妖兽在此拦路
        - 兽神鼓: 一面用夔牛皮制成的巨鼓，敲响可召集方圆万里的妖兽

  西部区域:
    焚天沙海:
      位置: 西妖域极西，金色死亡沙漠，温度极高。
      主要遗迹:
        - 汤谷: 沙海中心巨大凹陷，金乌残魂游荡，有太阳真火
        - 楼兰古国遗址: 被黄沙掩埋的人类古国残垣，常有沙暴
      主要地点:
        - 流沙漩涡: 毫无征兆出现的巨大流沙坑，连接地下暗河
        - 熔金河: 地下暗河的出口，流淌的是金色流沙
        - 枯骨台: 古国遗留的烽火台，现在被妖兽占据筑巢

    寂灭荒原:
      位置: 沙海边缘戈壁滩，寸草不生。
      主要遗迹:
        - 荒兽墓场: 上古巨型荒兽的集中埋骨地
      主要地点:
        - 拜月峰: 形似狼头的孤峰，月圆之夜阴气极重
        - 风蚀鬼城: 一片被风化成房屋形状的岩石群，夜间风声如鬼哭
        - 渴血石林: 这片石林的岩石呈赤红色，若有血液滴落会被瞬间吸干，内藏上古血蛭

    蚀日林:
      位置: 西部最边缘，被无尽沙风雕刻的岩石林。
      主要遗迹:
        - 风神殿: 悬浮在风眼中心的残破宫殿，藏有上古毕方之传承
      主要地点:
        - 磨骨风道: 两侧岩壁狭窄的通道，风力如刀，可瞬间剔除血肉
        - 无声谷: 这里的风速快到超越声音，谷内绝对寂静，神识无法延伸
        - 悬空石阶: 漂浮在风眼周围的碎石带，构成了通往风神殿的唯一路径

  南部区域:
    雷火炼狱:
      位置: 连接南泽域，火山密布，黑云笼罩。
      主要遗迹:
        - 麒麟洞: 火山口内，岩浆翻滚，藏有至宝和麒麟传承
      主要地点:
        - 焦木林: 被雷火劈焦的黑色森林，内藏上古妖帝遗迹，但始终无人能够抵达
        - 沸腾泥沼: 岩浆与地下水混合的区域，不断喷出高温毒气泡

    腐骨毒泽:
      位置: 南部低洼地带，与南泽域毒障交汇。
      主要地点:
        - 巨兽尸沼: 巨大的泥沼，漂浮着未腐烂的巨兽尸体
        - 瘴气喷口: 间歇性喷发彩色毒烟的地裂，周围寸草不生

  北部区域:
    通天脊:
      位置: 接壤北寒域高原，寒风如刀，山势险峻。
      主要遗迹:
        - 鲲鹏崖: 向外延伸的万丈悬崖，气流紊乱，传说为鲲鹏住所
        - 青丘: 隐藏的独立小世界，四季如春，内有狐妖和九尾狐
      主要地点:
        - 碎骨峰: 山脚堆积厚厚白骨，多为坠崖者
        - 鹰愁涧: 极窄的一线天峡谷，即便是飞禽也难以穿越
        - 冰挂长廊: 瀑布被瞬间冻结形成的冰柱群，倒挂在悬崖边

  东部区域:
    战殇峡谷:
      位置: 接壤中天域，上古人妖大战主战场。
      主要遗迹:
        - 兵魂冢: 埋葬无数残破法宝和兵器的土丘，金戈之气肃杀
      主要地点:
        - 怨灵迷雾: 终年不散的血色雾气，神识无法穿透
        - 镇妖碑: 上古人族大能立下的界碑，如今只剩断裂的基座
        - 尸傀道: 古战场上至今仍有无意识的尸傀按照生前的路线巡逻

    玄铁戈壁:
      位置: 靠近玄铁长城的缓冲区
