势力名称: 圣王朝

基本信息:
  定位: 统御西妖域的妖族帝国
  核心理念: 血脉尊卑，弱肉强食；顺我者昌，逆我者亡
  势力评级: 顶级
  统治疆域: 囊括整个西妖域，并时刻窥视中天域与北寒域

组织结构:
  政治结构:
    体系: 一皇四王八部制
    描述:
      一皇: 圣皇拥有至高无上的生杀大权
      四王: 分封东南西北四位圣王，镇守边疆，拥有自治权但需岁贡
      八部:
        天部: 统领飞行妖兽
        地部: 统领走兽
        水部: 统领水域妖族
        灵部: 掌管灵药与矿脉资源
        血部: 负责血脉评定与祖血池的开启
        刑部: 掌管刑罚，专杀叛逆
        祭部: 负责祭祀天地与妖神
        工部: 负责打造妖兵与修筑城池
  军事结构:
    圣神卫: 圣皇禁军，全员由拥有上古异兽血脉的化神大妖组成
    兽潮军: 常规军队，数量无穷无尽，由低阶妖兽组成
    巡天司: 负责监控领空与情报收集

核心人物:
  东皇溟:
    身份: 妖皇，三足金乌
    修为: 炼虚巅峰 (半步大乘)
    特质:
      - 太阳真火: 举手投足间可释放焚天烈焰
      - 绝对霸权: 视人族为两脚羊

  涂山雅:
    身份: 妖后，九尾天狐
    修为: 合体初期
    特质:
      - 魅惑众生: 智囊担当
      - 母仪天下: 掌控内政与财政

  东皇柔:
    身份: 嫡长女，金乌血脉
    修为: 金丹后期

皇室修行体系:
  功法名称: 《大日焚天圣经》
  体系特点:
    - 吞噬天地: 直接吞噬日精月华与高阶生灵血肉
    - 血脉压制: 高位血脉对低位血脉拥有天然的威慑力
    - 真身降临: 显露本体时战力暴涨

都城皇宫:
  名称: 太阳神宫
  地理位置: 西妖域 · 万兽山脉主峰 · 落日峰
  整体格局:
    描述: 依山势而建的宫殿群。落日峰被东皇溟削平峰顶，形成方圆百里的平台

  区域详解:
    皇极道 (入口):
      解释: 通往山顶平台的唯一山路
      主要设施:
        - 图腾柱林: 台阶两侧耸立着数百根高达百丈的石柱，每根柱子上都雕刻着一个归顺妖族的图腾，象征万妖臣服。
        - 鉴妖镜: 悬挂于山门的巨大铜镜，任何经过的生灵都会被照出原型。
        - 焚尸台: 山路两侧每隔百步便设有一座火台，上面常年焚烧着叛逆者的尸体

    外朝 (万妖广场):
      解释: 位于平台最外侧
      主要设施:
        - 祭天台: 广场中央一座由整块黑曜石雕刻而成的祭坛，高耸入云
        - 刑部大牢: 位于广场一侧的半地下建筑，关押着待处决的人族修士与妖族叛徒。
        - 生死台: 巨圆形竞技场，妖族若有争议或争夺职位，在此进行生死决斗。

    中廷 (八部官署):
      解释: 环绕内宫的环形建筑群，行政中心。
      主要设施:
        - 祖血池: 位于中廷东侧，湖水由万妖精血汇聚，每十年开启一次。
        - 藏珍库: 一座挖空山体的石窟，堆积着无数灵石、法宝与贡品。
        - 炼妖坊: 工部所在的区域

    内宫 (皇室禁地):
      解释: 位于平台正中央，也是地势最高处。
      主要设施:
        - 扶桑殿: 妖皇寝宫，依上古扶桑而建成
        - 青丘苑: 妖后居所。涂山雅运用大神通在此处布下幻阵，将粗犷的石山改造为江南园林景象。

    后山 (禁地):
      解释: 落日峰背面的阴影区。
      主要设施:
        - 陨日渊: 深不见底的峡谷，埋葬着历代陨落的金乌妖皇陨落
        - 锁龙井: 一口深井，用以囚禁数条不肯屈服的真龙，并抽取龙血炼制法器

与外界关系:
  虞王朝:
    关系: 死敌
    描述: 双方在玄铁长城一线常年交战。

  万兽山脉各族:
    关系: 绝对统治
    描述: 实行质子制度，各族必须送子嗣入宫。

  魔道三宗:
    关系: 利益交换
    描述: 敌人的敌人就是朋友，常有情报与资源交换。
