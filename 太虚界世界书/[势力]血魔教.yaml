势力名称: 血魔教

基本信息:
  定位: 邪三宗之一，魔道攻伐第一
  核心理念: 血海不枯，魔身不死；以血为兵，杀证混元
  势力评级: 顶级

修行体系:
  主修功法: 《修罗化血经》
  体系特点:
    - 赤血操演: 能自由控制离体血液。可将血液化为"血刃"，亦可让血液附于身体形成"赤鳞铠"。
    - 沸血: 燃烧体内精血，可强行提升修行者的境界
    - 修行至高深处，不仅能控己血，更能引动敌人体内的气血
  辅助体系:
    - 换血大法: 掠夺强横妖兽或特殊体质修士的精血，置换自身凡血，以此获得对方的部分血脉天赋
    - 血影遁: 化作血光瞬间远遁，代价是损耗三成精血，但速度冠绝同阶。

规模与结构:
  组织架构:
    最高权力:
      - 血河老祖: 统领全教
    职能部门:
      - 猎血堂: 负责在外猎杀高阶修士与妖兽
      - 化血池: 宗门禁地，此处修炼事半功倍
      - 赤衣卫: 宗门进行大规模侵略时的军队
    人员构成:
      - 魔子: 教主亲传
      - 真传弟子: 可进入化血池修炼，拥有独立血奴。
      - 内门弟子: 筑基期，修炼核心控血术。
      - 血奴: 被种下血咒的奴役

核心人物:
  韩有道 (血河老祖):
    身份: 现任教主
    修为: 合体后期
    特质:
      - 血魔之体: 肉身已完全能量化，哪怕被斩成碎片，只要有一滴血尚存，便能瞬间重生。
      - 霸道绝伦: 极度崇尚力量，认为鲜血是世间唯一的真理。常年坐在由无数白骨与鲜血浇筑的王座之上。

  杨修:
    身份: 韩有道真传弟子，也是血魔教当代魔子
    修为: 元婴初期
    特质:
      - 控血天才: 天生对血液有着极致的亲和力，能将血液压缩至肉眼不可见的丝线，杀人于无形。战斗风格极其优雅而残忍。
      - 冷血无情: 为了修炼，曾亲手抽干了自己家族三百口人的鲜血，心如铁石。

宗门地理与设施:
  地理定位:
    区域: 东灵域 · 幽冥裂谷深处 · 血海地狱
    地貌: 位于裂谷最深处，汇聚阴煞之气与死气，形成血海
  整体格局:
    描述: 建筑群立于血海之上。从外到内，建筑的重要程度越来越高

  区域详解:
    骸骨码头（最外）:
      解释: 连接外界与血海的唯一通道。
      主要设施:
        - 白骨舟: 漂浮在血海上的交通工具，由妖兽骨骼炼制，只有乘坐此舟才能安全渡过血海
        - 纳血台: 外出弟子上缴猎杀所得精血的地方

    凝血岛:
      解释: 弟子居住与修炼区
      主要设施:
        - 死斗台: 弟子之间解决恩怨的地方，胜者可以当场吸干败者的鲜血。

    核心:
      解释: 教主与长老的居所，位于血海深处最庞大的浮岛上
      主要设施:
        - 血河大殿: 宏伟的赤色宫殿，墙壁上挂满高阶修士的干尸
        - 化血池: 宗门最核心的禁地，金色血池，据说里面有一滴上古魔神的真血

与外界关系:
  合欢宗/噬魂殿:
    关系: 盟友 (邪三宗)
    描述: 同为魔道巨擘，三家在面对正道围剿时会联手。但在利益分配上，三家也常有内斗。

  天剑门:
    关系: 死敌
    描述: 天剑门和血魔教为世代死敌
