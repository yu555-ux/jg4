势力名称: 天剑门

基本信息:
  定位: 剑修圣地
  核心理念: 天剑无形，藏锋于渊；地势坤极，剑冲霄汉
  势力评级: 顶级

修行体系:
  主修功法: 《太渊藏锋录》
  体系特点:
    - 蓄势藏锋: 强调平日里收敛精气神，将剑意积蓄在丹田，养一口气
    - 绝命拔剑: 将积蓄数年剑意瞬间爆发，决绝无回
    - 剑心通明: 摒弃繁杂招式，只修纯粹剑心。以心御剑，万物皆可为剑。
  辅助体系:
    - 养剑术: 天剑门弟子必学的秘法，剑在人在，剑亡人亡
    - 裂谷淬体: 利用天遣裂谷中残留的上古混乱剑气打磨肉身

规模与结构:
  组织架构:
    最高权力:
      - 剑主: 宗门统领
      - 守渊人: 由退隐的太上长老组成，常年枯坐在裂谷最深处的渊底，镇压上古残剑与杀气
    职能部门:
      - 藏锋阁: 负责传授剑道与管理弟子，下设七大悬空剑台
      - 执剑堂: 负责宗门刑罚与对外征战
      - 铸剑池: 负责以渊底煞气铸剑
      - 葬剑地: 回收战死弟子或无主残剑的地方，也是弟子寻找机缘之地
      - 杂务殿: 处理杂事、发布任务、招收弟子
    弟子阶层:
      - 剑子（一人）: 年轻一代最强者，未来的剑主继承人
      - 亲传弟子: 获得长老认可，拥有独立悬空剑阁
      - 内门弟子: 需在裂谷中层自行开辟洞府，独自承剑气
      - 外门弟子: 居住在裂谷最上层，负责杂务，需每日下到谷底背负沉重剑石上来，以此磨练心性与体魄

核心人物:
  燕绝尘 (绝尘剑尊):
    身份: 剑主
    修为: 炼虚巅峰
  独孤剑:
    身份: 剑子
    修为: 元婴初期
  莫邪子:
    身份: 铸剑池长老
    修为: 化神中期

宗门地理与设施:
  地理定位:
    区域: 中天域 · 南部 · 天遣裂谷
    地貌: 深不见底的潜渊

  整体格局:
    描述: 宗门建筑倒挂于裂谷两侧绝壁之上。越往深处，剑气越强，地位越高。

  区域详解:
    地上区域:
      定位: 宗门入口与杂务交接处
      主要设施:
        - 迎客亭: 裂谷边缘唯一的接待处，仅供外客停留
        - 问剑路栈道: 通往渊底的唯一栈道入口，无护栏，凡入宗者必从此跳下或走下
        - 杂务殿分部: 负责采买生活物资，通过巨型绞盘吊篮运送至谷内

    上层区域:
      定位: 外门弟子居住与修炼区
      主要设施:
        - 磨剑崖: 外门弟子开凿的简陋石室。
        - 负重道: 一条垂直的峭壁小径，弟子需每日背负千斤剑石往返，磨练体魄。
        - 试金台: 外门大比之处，也是晋升内门的考核点。

    中层区域:
      定位: 内门弟子修炼区与核心职能区
      主要设施:
        - 悬空洞府: 内门弟子的居所
        - 执剑堂: 一座巨大的黑色悬空石殿
        - 铸剑池
        - 洗剑池: 位于此层的一方寒潭，用于淬火与洗炼剑心。

    下层区域:
      定位: 亲传弟子与长老居所
      主要设施:
        - 七大剑台: 藏锋阁下设的七座浮空平台，分别传授七种不同流派的剑意。
        - 执剑阁: 亲传弟子的独立楼阁，每一座都单独悬挂在绝壁凸起的岩石上。
        - 长老洞府: 深入岩壁内部的宏大空间。

    渊底区域:
      定位: 宗门禁地与最高中心，常人无法立足
      主要设施:
        - 剑主茅庐: 燕绝尘开辟的一小块灵田与茅屋，看似普通却处于剑气风暴中心
        - 万剑坟: 谷底地面，插满残剑，是历代弟子的葬剑之处
        - 悟剑壁: 裂谷尽头的光滑绝壁，留有开派祖师剑痕。
        - 守渊石窟: 守渊人枯坐的洞穴，镇压着裂谷深处的上古大恐怖

与外界关系:
  虞王朝:
    关系: 听调不听宣
    描述: 虞皇对天剑门极为忌惮，册封燕绝尘为“镇国剑尊”，但天剑门只在妖族大规模入侵时会出手，庇佑平民
  狂刀门:
    关系: 互不理解
    描述: 天剑门弟子看不起狂刀门，认为他们是拿刀乱砍的莽夫，狂刀门弟子则骂天剑门是装腔作势的伪君子
