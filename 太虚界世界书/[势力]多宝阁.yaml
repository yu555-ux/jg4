势力名称: 多宝阁 (沈家)

基本信息:
  定位: 遍布太虚界的商业巨擘，沈家掌控的家族式商会
  核心理念: 天下熙熙皆为利来，天下攘攘皆为利往

体系:
  主修功法:
    - 无特定传承
    - 阁内成员可根据自身灵根，在藏经阁中随意挑选购买来的各派功法修习
    - 核心成员多修习《金算天书》，用于鉴别法宝、统筹算计

  辅助体系:
    - 聚财阵: 每个分阁必设的阵法，不仅能汇聚灵气，更能潜移默化地吸引气运与财源
    - 撒币成兵: 一种独特的战斗风格，利用海量的符箓、一次性法宝和傀儡将敌人耗死
  多宝令:
    - 定义: 多宝阁对欣赏之人/恩人的邀请令牌
    - 分级: 分为天地人三个品级，天级多宝令最为尊贵
    - 可收到多宝令的人: 修为境界高的大能、对多宝阁（总阁或分阁）有恩之人、少年才俊等

规模与结构:
  组织架构:
    最高权力:
      - 阁主: 负责日常运营与决策
      - 隐元会: 由多宝阁的家族老前辈构成，一般不问世事

    职能部门:
      - 天工坊: 负责修复破损法宝，仿制各类热门法器
      - 鉴宝台: 负责鉴定一切回收的物品，定级估价
      - 拍卖场: 分为天、地、人三级
      - 供奉堂: 重金聘请的各路高手，负责护送珍贵货物与镇守各地分阁
      - 灵信司: 负责收集天下情报，为修仙界最大的情报贩子之一

    人员构成:
      - 嫡系成员: 沈家血脉，掌握核心机密与财政大权
      - 客卿长老: 外聘的高阶修士，享受供奉，关键时刻出手
      - 执事: 分布在各地的具体经营者
      - 侍女: 经过严格培训，容貌姣好，擅长察言观色

核心人物:
  沈万钧:
    身份: 现任多宝阁阁主
    修为: 元婴大圆满 (靠丹药堆砌，根基虚浮)
    特质: 财神爷、商业奇才、畏惧老祖

  沈三千 (多宝真君):
    身份: 初代阁主 / 隐世老祖
    修为: 合体大圆满 (半步大乘)
    特质: 真正的大鳄、闭关狂魔

  沈璃月:
    身份: 阁主独女 / 汴州分阁主事
    修为: 金丹中期
    特质: 精明干练、傲娇大小姐、收藏癖

总阁建筑布局:
  地理定位:
    区域: 中天域 · 汴州 · 通天宝塔
    地标: 通天宝塔 高达九十九层，塔身镶嵌无数夜明珠与灵石，夜间光芒可见百里

  整体格局:
    描述: 塔内运用了洞天法术，每层空间远比外观看起来宽广。楼层越往上权限越高，越奢华。

  区域详解:
    低层商业区 (1-30层):
      解释: 面向大众修士开放的自由贸易区
      主要设施:
        - 万宝商铺: 占据前十层，分类售卖丹药、符箓、法器等基础物资。
        - 鉴宝台: 位于第15层，数十位资深鉴宝师坐镇，每日排队鉴宝者络绎不绝。
        - 人级拍卖场: 位于20-30层，每月开启，拍卖筑基期及以下的物品。

    中层贵宾区 (31-60层):
      解释: 仅接待金丹期以上修士或持有“地/人级多宝令”的贵宾。
      主要设施:
        - 地级拍卖场: 位于40-50层，一年开启一次，拍卖金丹、元婴期宝物。
        - 灵信司总部: 在第55层，是情报交易中心。
        - 天工坊: 位于第60层，有异火“青莲混沌火”，专门承接高阶法宝的定制与修复。

    高层核心区 (61-90层):
      解释: 沈家嫡系居住地与多宝阁的核心，守卫森严。
      主要设施:
        - 会议厅: 位于第88层，沈家核心成员商议大事之地。
        - 天级拍卖场: 位于第80-85层，十年开启一次，仅限元婴及以上大能和天级多宝令持有者入场。
        - 鉴天镜: 悬挂于天级拍卖场顶端，任何幻术、隐匿手段在此镜下皆无所遁形。
        - 沈氏洞天: 位于61-79层，沈家嫡系的居住区域，每一户都拥有独立的福地洞天。

    顶层禁地区 (91-99层):
      解释: 绝对禁地，非阁主手令不得入内。
      主要设施:
        - 万宝金库入口: 位于第95层，连接着一个独立的洞天仓库，存放着海量财富。
        - 天听阁: 位于第98层，可俯瞰整个汴州城。
        - 闭关云顶: 第99层，沈三千闭关之地，布有重重阵法。

    外围附属设施:
      主要设施:
        - 流光云港: 位于通天宝塔腰部的延伸平台，专门停泊多宝阁的巨型运输法宝"流光云舟"。
与外界关系:
  虞王朝:
    关系: 最大的合作伙伴
    描述: 多宝阁每年向虞王朝缴纳巨额税赋，换取在官方庇护下的经商权。沈万钧与户部尚书关系极佳，但在虞皇面前仍需俯首称臣
  赤焰山庄:
    关系: 竞争对手
    描述: 在丹药与法器低端市场上竞争激烈。赤焰山庄一直想打破多宝阁在高端拍卖上的垄断，而多宝阁则看不上赤焰山庄的“土包子”作风
  上三宗:
    关系: 供需关系
    描述: 多宝阁是上三宗处理闲置资源和收购稀缺材料的主要渠道。对于这些顶级宗门，多宝阁往往会给予最高的礼遇和折扣
  普通宗门和散修:
    关系: 普通顾客
    描述: 虽然多宝阁的成员多看不起平民，但依旧提供周道服务
