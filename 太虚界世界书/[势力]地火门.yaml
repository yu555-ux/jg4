势力名称: 地火门

基本信息:
  定位: 曾是上古异火大宗的遗脉，如今没落为依附赤焰山庄生存的二流宗门。
  核心理念: 纳万炎于一炉，炼百味于红尘
  势力评级: 二流中等

修行体系:
  主修功法: 《纳火真经》 (残篇)
  功法特点:
    - 兼容并包: 此功法无属性限制，理论上可强行吞噬炼化天下任何异火为己用
    - 进阶艰难: 起步极低，凡人亦可修炼。但若无高阶异火吞噬，修为便如蜗牛爬行；且吞噬异火九死一生，稍有不慎便会焚身而亡，导致门中弟子多停留在筑基期
    - 控火入微: 因常年需压制体内驳杂火气，门人对火焰的操控力非常精确

  辅助体系:
    - 冰心诀: 配套的养气法门，用于在吞噬异火时护住心脉，防止被心火焚神
    - 药膳调理: 门主方羽舞独创的体系，利用特定灵材烹饪成膳食，以此中和体内火毒，温养受损经脉

规模与结构:
  组织架构:
    最高权力:
      - 门主: 掌管宗门，负责对外（主要是对赤焰山庄）的交涉与物资争取

    职能部门:
      - 提纯司: 承接赤焰山庄的灵矿提纯任务，是宗门主要的灵石来源
      - 寻火堂: 负责四处打探异火的消息，并组织弟子前往捕获
      - 烟火巷: 负责宗门的后勤与灵食经营，也是火云城最富盛名的小吃街
      - 育幼院: 收养火云城中无家可归的孤儿，门主亲自教导其识字与基础控火术

    人员构成:
      - 嫡传弟子: 也就是阿暖一人，被寄予厚望能修成完整真经
      - 内门弟子: 多为方羽舞收养长大的孤儿
      - 外门帮众: 主要是火云城的底层修士，为求一门手艺而加入

核心人物:
  温红袖:
    身份: 现任门主
    修为: 元婴初期 (早年因强行吞噬某种凶火试图突破，导致经脉受损，修为停滞)
    特质:
      - 护短慈母: 对门下弟子极尽温柔，常亲自下厨为弟子改善伙食，缝补衣衫。视宗门如家，不允许外人欺负自家孩子
      - 嘴硬心软: 面对祝融山时总是冷嘲热讽，数落他"不懂风情"、"只会打铁"，但当赤焰山庄遇事时，总是第一个带人冲上去帮忙
      - 勤俭持家: 精打细算过日子，为了给弟子凑齐吞噬兽火的辅助灵药，常与赤焰山庄的账房锱铢必较

  阿暖:
    身份: 门主亲传弟子
    修为: 金丹中期
    特质:
      - 万火亲和体: 天生特殊的体质，任何火焰在她手中都如温顺绵羊，是修炼《纳火真经》的不世出的天才
      - 贴心小棉袄: 极擅长察言观色，常在师父与祝庄主僵持不下时递台阶，私下里与祝灵儿以姐妹相称
      - 贪吃: 继承了师父的厨艺天赋，且是个十足的吃货，随身储物袋里装满了各种零嘴

宗门地理与设施:
  地理定位:
    区域: 中天域 · 火云城 · 城南火巷
    地貌: 位于火云城南部的一片老旧街区，地势平坦。与北部高耸气派的赤焰山庄隔着繁华的中央大道相望

  整体格局:
    描述: 不像修仙宗门，更像是一片充满了市井烟火气的大杂院。建筑多为红砖青瓦的低矮院落，巷弄纵横交错，空气中常年飘荡着饭菜的香气与淡淡的药草味

  区域详解:
    前街 (烟火巷):
      解释: 对外开放的区域，也是火云城的平民美食中心。
      主要设施:
        - 红袖酒楼: 地火门的门面，门主偶尔心情好时会亲自下厨，赤焰山庄高层拥有专属包厢。
        - 灵材铺: 出售经过弟子精细提纯的基础灵材，深受散修喜爱。
        - 问诊台: 每天清晨会有弟子在此免费为城中平民用温和火气驱寒祛湿。

    中院:
      解释: 门人居住与生活的地方，温馨而嘈杂。
      主要设施:
        - 育幼院: 一座种满向日葵的大院子
        - 演火场: 弟子们练习控火术的广场，常用来举办烤肉大会。
        - 大灶房: 拥有上百口大锅的露天食堂，全宗门的人都在此一同进食。

    后院:
      解释: 相对安静的区域，设有阵法隔绝。
      主要设施:
        - 吞火室: 四壁用耐火黑曜石砌成，内设极寒冰阵，供弟子在吞噬火焰时压制火毒。
        - 藏经阁: 一座不起眼的小阁楼，存放着那卷残缺的真经和历代先辈的吞火心得。
        - 温养池: 引地下水并投入大量药材的药池，供弟子修炼后浸泡。

与外界关系:
  赤焰山庄:
    关系: 合作
    描述: 赤焰山庄提供大量任务养活地火门。祝融山常借口"品尝新菜"来蹭饭挨骂，实则是送来修炼资源

  散修盟:
    关系: 紧密合作
    描述: 地火门常向散修盟发布寻找异火线索的任务。散修盟成员也喜欢来烟火巷落脚，因为这里物美价廉且不排外

  多宝阁:
    关系: 商业拉拢
    描述: 多宝阁看中了地火门弟子精湛的灵材提纯手艺，多次试图高薪挖墙脚，甚至想收购《纳火真经》的残篇，但都被方羽舞拒绝
