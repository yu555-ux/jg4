势力名称: 泅水阁

基本信息:
  定位: 中天域北境白玉京的最大宗门，行事霸道的水系强宗
  核心理念: "水能载舟，亦能覆舟；顺我者昌，逆我者亡"
  势力评级: 一流下等

修行体系:
  主修功法: 《千钧溺水诀》
  功法特点:
    - 共十二个招式
    - 水如千钧: 招式运转的灵气可化千钧水，擅长以力压人
    - 溺水三千: 境界高深者，可用千钧重水压制对方，使其如同溺水，不可呼吸、不可运转灵气
    - 暗劲: 溺水亦可侵入对手经脉，破坏根基

  辅助体系:
    - 奴役水兽: 每个内门弟子都会配备一头本命水兽
    - 极乐术: 阁主和高层专修的双修之法，用于掠夺水灵根/阴灵根/冰灵根女修的元阴以滋补自身

规模与结构:
  组织架构:
    最高权力:
      - 阁主: 统揽大权
      - 太上长老团: 三位退隐的合体境老祖，非灭门危机不出

    职能部门:
      - 刑水堂: 负责宗门刑罚与对外追杀，手段极其残忍，堂主拥有先斩后奏之权
      - 传功阁: 负责弟子教导与功法传承。
      - 揽月楼: 负责宗门财务、外交与情报，同时也负责搜罗资质上佳的女修
      - 养兽阁: 负责驯养和管理宗门的水系灵兽

    弟子阶层:
      - 真传弟子（5人）: 阁主与各类堂主亲传，享有最高修仙资源
      - 内门弟子: 多金丹境，宗门中坚力量，修习核心功法
      - 外门弟子: 多筑基境，负责执行杂务与巡逻，竞争极其残酷
      - 杂役: 依附于宗门的凡人或刚踏入修行的修士，地位低下

核心人物:
  江断流:
    身份: 泅水阁阁主
    修为: 化神后期
    性格: 枭雄心性，极度贪婪且极具耐心。为了完美吞噬玄水宫与母女元阴，布局多年

  江天赐:
    身份: 少阁主 （江断流独子）
    修为: 金丹巅峰
    性格: 骄横跋扈，色欲熏心。视玄水宫沈雨眠为禁脔，多次带人上门挑衅

  洛无痕:
    身份: 江断流亲传弟子
    修为: 元婴初期
    性格: 沉默寡言，醉心武道，是江天赐最有力的竞争者，但出身卑微

  温婉宁:
    身份: 揽月楼楼主/温婉云之妹
    修为: 元婴中期
    性格: 表面长袖善舞，实则心机深沉，专门负责为高层物色炉鼎

宗门地理与设施:
  地理定位:
    区域: 中天域 · 白玉京 · 烟波泽中心
    地貌: 占据了烟波泽中心最大的连环岛屿群，水深千丈

  整体格局:
    描述: 分为水上建筑和水下建筑。水上是连环岛屿群；水下是森严恐怖的地宫。

  区域详解:
    水上群岛:
      主岛:
        解释: 宗门权力的核心
        主要设施:
          - 议事大殿: 阁主发号施令之处
          - 极乐水榭: 建在岛心湖泊最美处的奢华宫殿，是高层享乐、接待贵客的场所
      东岛:
        解释: 财务、外交与情报中心
        主要设施:
          - 揽月楼
      西岛:
        解释: 传承之地。
        主要设施:
          - 传功阁
      南岛、北岛:
        解释: 南岛为内门和真传弟子居所，北岛为外门弟子和杂役的住所

    水下地宫:
      地宫第一层:
        解释: 核心修炼
        主要设施:
          - 溺水地宫: 位于水下千丈，是核心弟子修行《千钧溺水诀》之地。

      地宫第二层:
        解释: 刑罚与关押。
        主要设施:
          - 刑水堂
          - 囚水牢: 关押敌对势力修士与不服从的小宗门掌权者的地方，半个身子泡在毒水中，求生不得求死不能


    外围水域 :
      环岛水域:
        解释: 防御屏障与资源点。
        主要设施:
          - 养兽阁
          - 万兽水栏: 圈养着上千头凶猛水兽的巨大水域，由养兽阁管理，每日都要投喂大量血食，既是养兽场也是护宗大阵的一部分。

与外界关系:
  玄水宫:
    关系: 敌对
    描述: 觊觎温婉云母女，和其谷内深处的九阴女帝之传承
  狂刀门:
    关系: 表面盟友
    描述: 为了对抗更南方的中天域正统势力，两者维持着脆弱的同盟，但在利益分配上常有摩擦
  虞王朝:
    关系: 臣服，但试图反抗
    描述: 表面臣服于虞王朝的统治，但江断流一直在暗中试图反抗
