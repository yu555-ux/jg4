势力名称: 虞王朝

基本信息:
  定位: 终结夏朝五百年乱世的大一统的人类王朝朝
  核心理念: 普天之下，莫非王土；率土之滨，莫非王臣
  势力评级: 顶级
  统治疆域: 囊括整个中天域，并在四域边境设立都护府

组织结构:
  政治结构:
    体系: 三省六部制
    描述:
      三省:
        - 中书省: 负责起草律令，内设"中书舍人"，皆为元婴期文修，负责将圣旨刻录道韵
        - 门下省: 负责审核，驳回不合天道的旨意
        - 尚书省: 执行机构，统领六部
      六部:
        - 吏部: 掌管天下官吏升迁与宗门评级。凡在虞朝境内开宗立派，必须经吏部册封，领取"仙籍"。
        - 户部: 掌管天下灵脉普查、灵石税收。
        - 礼部: 掌管祭祀天地、封神大典及与上三宗的外交。下设"教坊司"，收纳罪臣妻女修习媚术。
        - 兵部: 统领龙旗军与各州府兵。
        - 刑部: 掌管《虞律》，下设"斩仙司"，专门追捕违反禁令的修士。
        - 工部: 掌管营造皇陵、修筑城池阵法与打造战争法宝。
  军事结构:
    神策卫:
      - 定位: 皇帝禁军，只听命于虎符。
      - 实力: 全员金丹期以上，装备制式"破法弩"与"玄金甲"，结阵可杀炼虚。
    龙旗军:
      - 定位: 驻扎各州的军队。
      - 特点: 擅长军阵煞气，行军时煞气冲霄，可冲散修士的神识与术法。
    镇国府:
      - 定位: 统筹边境防御，由皇室宗亲与军功封王者组成。
  特殊机构:
    监天司: 直属御前，负责处理邪物与外道，独立于三省六部之外。

核心人物:
  宇文震央:
    身份: 开国皇帝，虞皇
    修为: 炼虚初期
    特质:
      - 雄才大略: 结束乱世，建立严密的修士管理制度。
      - 疑心极重: 甚至在皇宫地下埋设了自毁阵法，以此威胁修仙宗门。

  姬长月:
    身份: 皇后
    修为: 合体中期
    特质:
      - 母仪天下: 出身隐世家族，手段圆滑，负责拉拢各大宗门的女修。

  宇文烈:
    身份: 嫡长子 / 神策卫大统领
    修为: 元婴后期
    特质:
      - 杀伐果断: 常年带兵在外征战，身上煞气比龙气更重。

皇室修行体系:
  功法名称: 《皇道龙气经》
  体系特点:
    - 集众之道: 借万民愿力修行。疆域越广、百姓越富庶，修为提升越快。
    - 绝对压制: 在虞朝疆域内，皇室成员言出法随，可借龙气压制敌方修士三个小境界。
    - 万法不侵: 龙气护体，诸邪退避，心魔难生。

都城皇宫:
  名称: 紫微宫
  地理位置: 中天域 · 洛阳城 · 城市中轴线最北端
  整体格局:
    描述: 坐北朝南，建立在"九龙汇聚"的灵脉节点之上。宫城呈回字形，占地极广。宫内禁空，设有"禁断大阵"，除皇帝外无人可飞行。

  区域详解:
    承天门 (正门):
      解释: 皇宫正南门，高达百丈的城楼。
      主要设施:
        - 登闻鼓: 设在门侧，凡人若有冤屈可击鼓，鼓声通过阵法直达御前。
        - 斩仙台: 门前广场中央的暗红色石台，专门处决犯上作乱的高阶修士
        - 金水河: 护城河，河水引自地下灵泉，河底布满杀阵

    外朝 (政务中心):
      解释: 举行大典与处理政务的区域
      主要设施:
        - 含元殿: 皇宫第一大殿，建在三层汉白玉台基之上。大典、登基皆在此举行。殿顶盘踞着一条由虞朝气运凝聚的金龙虚影
        - 宣政殿: 皇帝日常上朝之处，文武百官在此议事。
        - 六部官署: 分列御道两侧，每一座官署都是一个独立的小型洞天。

    内廷 (皇室生活):
      解释: 后妃与皇子居住区
      主要设施:
        - 乾清宫: 皇帝寝宫，设有直通地下龙脉的密室。
        - 坤宁宫: 皇后寝宫，内有小型灵药园与炼丹房。
        - 御花园: 汇聚天下奇花异草。其中有一株“建木”，树叶枯荣代表虞朝的气运兴衰。

    静天府 (监天司):
      解释: 位于皇宫西北角
      主要设施:
        - 观星台: 漆黑的高塔，监天司司正常在此俯瞰天下
        - 万罪窟: 地下收容所，关押着无数邪物。

    禁地 (地下龙脉):
      解释: 紫微宫地底深处。
      主要设施:
        - 逆天坛: 宇文震央闭关之所，位于九条地底灵脉的交汇点。
        - 镇国库: 虞王朝的国库，收藏着灭掉夏朝及无数小宗门后搜刮来的底蕴。
        - 祖庙: 供奉宇文家族历代先祖牌位，也是护国大阵的阵眼所在。

与外界关系:
  妖皇朝:
    关系: 死敌
    描述: 双方在边境陈兵百万，常年拉锯。

  上三宗:
    关系: 既拉拢又提防
    描述: 尊其为国教，每年赐下巨额赏赐，但也通过吏部严格限制其在凡俗界的影响力。

  浩然书院:
    关系: 人才库
    描述: 书院就在皇宫隔壁，是王朝官员的主要来源地。
