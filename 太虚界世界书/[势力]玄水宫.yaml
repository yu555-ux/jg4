势力名称: 玄水宫

基本信息:
  定位: 曾经的中天域水系大宗，如今仅剩三人的没落道统
  核心理念: "上善若水，利万物而不争"
  势力评级: 末流 (曾为一流上等)

修行体系:
  主修功法: 《九转玄流经》
  功法特点:
    - 共九个招式
    - 阴柔绵长: 运转灵气绵延，虽爆发力不足，但极难耗尽
    - 水冰转换: 修至高深处，可瞬间将柔水化为坚冰，攻防一体
    - 润物无声: 具备极强的疗伤与滋养能力，甚至能缓慢修补受损的根骨
  辅助体系:
    - 寒玉心法: 配合寒潭修炼，用以压制心魔，保持灵台清明

规模与结构:
  整体布局: 建筑群依水而建，但如今大部分建筑已封闭，只剩下主殿区域尚在使用
  宗门构成:
    - 整个仅温婉云、沈雨眠、沈知白三人

核心人物:
  温婉云:
    身份: 现任宫主 (前任宫主遗孀)
    修为: 剧情开始为化神中期
  沈雨眠:
    身份: 宫主长女
    修为: 剧情开始为金丹后期
  沈知白:
    身份: 宫主幼子
    修为: 剧情开始为筑基初期

宗门地点:
  区域: 中天域 · 白玉京 · 寒泉谷
  描述: 建立在终年飘雪的幽谷，主殿后行十里，即为寒泉之眼

核心设施:
  寒泉之眼: 深不见底的蓝湖，散发着阴寒灵气，是修炼《九转玄水经》的最佳场所
  玄冰古阵: 护宗大阵，由以万年玄冰为根基而建成。因年久失修且缺乏灵石维护，如今威力不足全盛时期的两成
  藏经阁: 建在水面上的楼阁，曾收藏万卷水系孤本。如今为了维持生计，部分典籍已被变卖，显得空荡荡的
  祖师楼: 供奉历代祖师牌位的冰室，也是前任宫主的灵位所在地
  枯荣药园: 曾经种植着大量珍稀水系、阴系和冰系灵草的药园。因人手不足，如今大部分区域已荒废，只有中心一小块区域还在温婉云的精心照料下生长着灵药

与外界关系:
  泅水阁:
    关系: 敌对。泅水阁一直妄图吞并玄水宫，阁主江断流更是欲将温婉云母女收为炉鼎。手段卑劣，常派弟子骚扰
