势力名称: 太虚仙宗

基本信息:
  定位:  正道领袖，上三宗之首
  核心理念: 虚实相生，道法自然
  势力评级: 顶级

修行体系:
  主修功法: 《太虚真经》
  体系特点:
    - 虚实转化: 可将灵气瞬间转化为实物，亦可将受到的攻击虚化
    - 炼假成真: 修行至深处，心中所想即为现实

规模与结构:
  组织架构:
    最高权力:
      - 太虚道庭: 由宗主与五位峰主共同组成，通常在太虚峰顶议事
    职能部门:
      - 依六峰职能划分，各司其职，互不干涉但紧密配合。
    人员构成:
      - 圣子/圣女: 宗主亲传，未来宗主的候选人，地位尊崇。
      - 真传弟子: 各峰峰主亲传
      - 内门弟子: 资质优异，居于各自主峰修炼。
      - 外门弟子: 居于山脚或外围附属山峰

核心人物:
  林清霄 (太虚天尊):
    身份: 宗主 / 太虚峰主
    修为: 大乘期
    特质:
      - 返璞归真: 气息如凡人般平平无奇，实则已达"天人合一"之境，一举一动皆蕴含大道韵律。
      - 深不可测: 极少出手，传说他只需一个念头，便能让方圆万里的现实规则发生扭曲。

  陈长生 (断空剑尊):
    身份: 灵霄峰主
    修为: 合体巅峰
    特质:
      - 极致攻伐: 主修"实"之剑道，认为一力降十会。剑气凝练至极，可斩断虚空。
      - 护短好战: 脾气直爽，也是宗门对外的威慑力量，常驻虚空战场。

  花落雪 (梦华仙子):
    身份: 观月峰主
    修为: 合体后期
    特质:
      - 幻术通神: 擅长以虚化实，能将敌人拉入永恒的幻梦之中。
      - 清冷出尘: 不喜俗务，终日与月华、云雾为伴，门下女弟子皆气质若仙。

  沈琉璃 (太虚圣女):
    身份: 宗主亲传弟子
    修为: 元婴初期
    特质:
      - 天赋卓绝: 天生"太虚道体"，对空间与虚实法则有着惊人的亲和力。
      - 高贵清冷: 视凡俗如尘埃，一心问道，是年轻一代仰望的存在。

宗门地理与设施:
  地理定位:
    区域: 中天域 · 玉霄山脉
    地貌: 位于太虚界之中心，六座主峰拔地而起，山峰顶端以长桥相连，可互相直达

  整体格局:
    描述: 以太虚峰为核心，其余五峰环绕。山下是依附宗门而生的城镇，山上则是修仙圣地。

  区域详解:
    太虚峰:
      解释: 宗主居所，常年隐于云雾中
      主要设施:
        - 太虚道宫: 宗主起居与议事的大殿，非召不得入。
        - 无漏池: 位于峰顶天池，由灵气积郁而成。核心弟子在此浸泡可洗髓

    灵霄峰:
      解释: 宗门战力最强的一峰
      主要设施:
        - 演道台: 建于峰侧的石台，布有高阶虚实禁制。弟子在台上受到致命伤，下台瞬间便会由实转虚，完好如初
        - 剑冢: 历代灵霄峰弟子和长辈的遗留佩剑之地

    万机峰:
      解释: 处理全宗杂务
      主要设施:
        - 太虚经海: 位于后山洞天，功法简牍化作游鱼在洞天内穿梭。有缘弟子神识探入，便可捕获适合自己的传承
        - 功勋殿: 任务发布与结算
        - 执法阁: 犯错弟子禁足反思之地

    丹霞峰:
      解释: 传授太虚宗独特丹道，峰主常开展丹道大比
      主要设施:
        - 丹楼: 一座小阁楼，可供丹道传授、炼丹
        - 万药台: 丹霞峰峰主不定时在此举办丹道大比
        - 灵药云圃: 开辟在云端的药田

    守静峰:
      解释: 用于弟子和长老的闭关，同时关押重犯
      主要设施:
        - 禁牢: 关押重犯之地，位于山腹深处
        - 闭关洞天: 提供给即将突破大境界弟子的密室

    观月峰:
      解释: 均为女修，可学传统修仙，亦可学画术、歌舞
      主要设施:
        - 望月台: 女弟子学习之地

    山门入口:
      主要设施:
        - 太虚鉴: 悬挂于山门之上的古镜。任何入宗者经过，皆会被映照出灵根品阶与内心深处的邪念，妖魔鬼怪无所遁形。

与外界关系:
  万法宗/造化道门:
    关系: 合作竞争
    描述: 同为正道巨擘，面对魔道和妖兽联合，在招收弟子上呈欣欣向荣之竞争

  虞王朝:
    关系: 尊崇
    描述: 虞王朝对太虚仙宗保持敬意，太虚仙宗通常不干涉王朝更替，只在人族大劫时出手

  天剑门:
    关系: 私交
    描述: 林清霄与天剑门主私交甚好，关系融洽
