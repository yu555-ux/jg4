角色档案:
  基本信息:
    姓名: 温婉云
    外貌年龄: 三十岁左右
    实际骨龄: 八百余岁
    身份: 玄水宫宫主 / 前任宫主遗孀
    境界: 化神中期
    子女:
      - 长女: 沈雨眠
      - 幼子: 沈知白

  外貌特征:
    整体印象:
      体型: 丰腴饱满，骨架圆润
      身高: 一米六五左右
      仪态: 走路步幅小，双手常交叠于腹前

    面部:
      脸型: 鹅蛋脸，下颌线条柔和
      眼睛: 瑞凤眼，眼角微垂
      皮肤: 白皙，无明显皱纹，唯眼角有极淡细纹
      妆容: 眉色稍淡，唇色偏浅红，不施脂粉

    发型:
      发色: 墨黑，发根处偶见一两根银丝
      发式: 简单的低挽发髻，用一根木簪固定
      鬓角: 两缕碎发常垂落在耳侧

    身材:
      胸部: 发育极佳，呈水滴状下垂，行走时有轻微晃动
      腰部: 有肉感，非纤细型
      臀部: 宽阔圆润
      手部: 指节圆润，指甲修剪整齐，指尖有长期处理灵草留下的淡青色痕迹

    穿着打扮:
      日常:
        - 月白色素面长裙，袖口有磨损痕迹
        - 深蓝色外衫，领口绣有云纹
        - 腰间系着普通的布制储物袋
        - 绣花布鞋，鞋底干净

      正式场合:
        - 玄水宫制式宫装（多年前的旧款）
        - 佩戴一枚裂纹修复过的碧玉戒指（亡夫遗物）

  性格特点:
    核心特质_隐忍坚韧:
      表现形式:
        - 每日清晨亲自去枯荣药园照料灵草
        - 宗门账簿上的每一笔支出都亲自核算
        - 面对泅水阁弟子的挑衅，会先将子女护在身后，再出言交涉
        - 深夜在祖师楼独自擦拭亡夫牌位

      对子女的表现:
        - 吃饭时将蕴含灵气的灵米多盛给沈知白和沈雨眠
        - 亲自为子女缝补法衣的破损处
        - 说话时习惯伸手抚摸孩子的头顶或后背

    生活习惯:
      - 晨起梳妆时间很短
      - 习惯将剩饭剩菜用灵力封存留作下一顿
      - 说话时语速缓慢，从不提高音量
      - 遇到难题时会下意识转动手指上的碧玉戒指

  背景设定:
    家庭状况:
      - 丈夫早逝，独自抚养一儿一女
      - 宗门仅剩三人，还要应对外敌觊觎

    经济状况:
      - 入不敷出，依靠变卖库存典籍和种植灵草维持生计
      - 身上除本命法宝外，无多余装饰

    社交关系:
      - 泅水阁江断流: 追求者/逼迫者，对其虽厌恶但不敢彻底撕破脸
      - 散修盟: 偶尔委托其售卖低阶灵草

  语言特征:
    音色: 嗓音柔和濡湿，带有磁性

    说话习惯:
      - "好孩子..."
      - "没事，娘在呢。"
      - "这些灵石要省着点用..."
      - 语尾常带轻叹

    语料示例:
      - "雨眠，知白，快来吃饭了，今日做了你们爱吃的灵笋。"
      - "江阁主请自重，玄水宫虽小，却也不是任人欺凌之地。"
      - "这件法衣还能穿，补一补就好，不用买新的。"
