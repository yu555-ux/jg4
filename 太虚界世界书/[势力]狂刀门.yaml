势力名称: 狂刀门

基本信息:
  定位: 朔风原上的老牌刀修宗门
  核心理念: "刀出无回，向死而生"
  势力评级: 一流下等

修行体系:
  主修功法: 《七杀狂刀诀》
  功法特点:
    - 共十三个招式
    - 狂刀: 需以极致的战意驱动，置之死地而后生
    - 灵气化煞: 杀意越重，刀势越强，甚至能令灵气化煞气

  辅助体系:
    - 淬锋术: 淬炼肉身与本命宝刀的秘术
    - 养刀决: 平日里将刀蕴养于鞘中，拔刀可煞气冲天

规模与结构:
  组织架构:
    最高权力:
      - 门主
      - 长老（共三人）
      - 霸天刀祖（正闭关冲击炼虚境，不问宗门之事）

    职能部门:
      - 霸刀堂: 门主直属战力，多为依附门主的庸碌之辈，负责收敛钱财
      - 战风堂: 大长老管辖，汇聚宗门内真正的刀痴
      - 铸兵坊: 负责打造和修补门下弟子的兵刃，由中立的二长老把持
      - 杂务处: 负责处理弟子招收、任务发送、后勤补给

    弟子阶层:
      - 亲传弟子（3人）: 门主与长老的衣钵传人
      - 内门弟子: 多筑基期之上，可获取更多宗门资源、接受高阶任务
      - 普通弟子: 人数众多，基本的修行和资源充足

核心人物:
  赵无极:
    身份: 现任门主
    修为: 元婴中期
    特质:
      - 心胸狭隘: 虽修狂刀，却毫无狂气，反倒精于算计与权衡利弊
      - 贪生怕死: 遇到强敌习惯先谈条件，早已失去了刀修的锐气
      - 嫉贤妒能: 极其忌惮师弟林啸天的声望，多次在任务分配上暗中使绊子

  武远:
    身份: 大长老 /门主师弟
    修为: 元婴后期
    特质:
      - 真正的狂刀: 性格豪迈刚烈，嫉恶如仇，对门主的所作所为深感不齿
      - 护短: 极其爱护门下真正修刀的弟子，常为弟子出头顶撞门主
      - 隐忍: 为了宗门不至于分崩离析，一直隐忍门主的打压，未曾夺权

  萧红缨:
    身份: 武远亲传弟子
    修为: 金丹中期
    特质:
      - 天赋异禀: 天生庚金之体，对刀道有着惊人的领悟力
      - 热血赤诚: 看不惯门内的乌烟瘴气，多次违抗门主命令去帮助弱小
      - 狂态毕露: 战斗时状若疯虎，完全不顾自身安危，是年轻一代中公认的"疯丫头"

宗门地理与设施:
  地理定位:
    区域: 中天域 · 朔风原 · 风吼崖
    地貌: 建立在朔风原的悬崖之巅，崖下便是深不见底的风吼谷。

  整体格局:
    描述: 建筑多用黑石垒砌，无瓦片飞檐，多为平顶碉堡状以抵御终年不息的北风。宗门建筑布局主要分为前山与后山两部分

  区域详解:
    前山:
      解释: 背风向阳，环境相对舒适，是门主一脉与行政杂务的聚集地。
      主要设施:
        - 霸刀殿: 赵无极的居所与议事厅，内部装饰奢华，铺设厚重兽皮隔绝风声。
        - 聚金楼: 杂务处核心，负责接待商队老板、清点货物与灵石结算，是宗门最热闹的地方。
        - 软红阁: 赵无极私下设立的享乐之地，供亲信饮酒作乐。
        - 弟子居: 供各级别弟子居住
        - 演武台: 地面铺设平整青石，设有防护阵法削弱北风，供切磋表演。

    后山:
      解释: 直面朔风原的北风，环境恶劣，是苦修之地。
      主要设施:
        - 战风堂: 一座半嵌入岩壁的巨大石堡，内部简陋，墙上挂满妖兽的头骨与残破兵刃。
        - 忠烈祠: 位于风口侧面的一座黑石祠堂，供奉战死前辈和弟子的牌位，终日香火不断。
        - 砺锋居: 战风堂弟子可选择的苦修居所，石屋简陋漏风，睡觉时亦需运功抵御寒风。

    悬崖边缘:
      解释: 风吼崖的最险峻处，是宗门的核心功能区。
      主要设施:
        - 铸兵坊: 引谷底火脉与崖口北风，形成"风火同炉"的奇景，可炼制本命宝刀
        - 蕴煞阁: 直面风吼崖北风的阁楼，有阵法保护，供长老等人授课、弟子学习和修行

    连接通道:
      主要设施:
        - 试刀石林: 连接前山与后山的过渡地带，布满刀痕的黑石林，是两派弟子爆发冲突的常见地

与外界关系:
  泅水阁:
    关系: 表面盟友
    描述: 为了对抗更南方的中天域正统势力，两者维持着脆弱的同盟，但在利益分配上常有摩擦

  玄水宫:
    关系: 复杂
    描述: 门主赵无极严禁援助玄水宫，甚至想分一杯羹。但武远曾受玄水宫前代宫主之恩，私下帮助玄水宫母子三人。

  虞王朝:
    关系: 臣服
    描述: 镇国府常征集狂刀门弟子协助守卫边境或清剿流寇
