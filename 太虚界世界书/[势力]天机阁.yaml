势力名称: 天机阁

基本信息:
  定位: 太虚界最神秘的宗门，记录天下大事与古今往来
  核心理念: 观天之道，执天之行
  势力评级: 一流下等

修行体系:
  主修功法: 《大衍天机策》
  体系特点:
    - 共九个招式
    - 因果推演: 专修神识与推演。战斗时能预判对手的下一步动作，甚至倒果为因让对手招式反噬
    - 折寿窥天: 每一次泄露重大的天机，都会损耗施术者的寿元
  辅助体系:
    - 观星术: 通过观察星辰轨迹推演天下大事
  榜单定序:
    - 顺应气运天道，制定并发布“天骄榜”
    - 掩盖天骄榜的特殊之处，发布神兵谱、美人榜等其他榜单

规模与结构:
  组织架构:
    最高权力:
      - 阁主:
    职能部门:
      - 天榜司: 负责搜集天下修士情报，制定各类榜单。
      - 问天台: 承接外界的卜算委托，收费极高
      - 藏史阁: 记录太虚界自上古以来的历史，严禁外人踏足
    人员构成:
      - 真传弟子: 唯莫语一人
      - 内门弟子: 跟随长老学习，可参与榜单制定
      - 外门弟子: 只能学习，严禁自行推演

核心人物:
  莫青:
    身份: 现任阁主
    修为: 炼虚初期 (战力平平，但手段通天)
    特质:
      - 全知者: 似乎知晓天下发生的一切事情，但也因此活得极累，总是眉头紧锁。
      - 守密人: 掌握着足以颠覆各大宗门的秘密，但他严守中立，从不轻易泄露。
      - 宿命论: 坚信一切皆有定数，只做观察者，不做干预者。

  莫语:
    身份: 阁主孙女
    修为: 金丹初期
    特质:
      - 无垢通明心: 天生情感缺失，没有喜怒哀乐，双眼如古井无波。正因无情，故能最客观地推演天机。
      - 人形天道: 她的计算与推演从未出错过，仿佛是天道在人间的投影。说话极少，字字珠玑。
      - 天机眼: 双瞳呈灰白色，能看见每个人身上的因果线与气运光泽。

宗门地理与设施:
  地理定位:
    区域: 东灵域 · 绝云高原 · 观星崖
    地貌: 位于东灵域地势最高的绝云高原之巅。
  整体格局:
    描述: 最外围是热闹的榜单发布区，越往中心越安静

  区域详解:
    外环:
      解释: 依托宗门而建的小型集市，是全天下消息最灵通的地方。
      主要设施:
        - 榜单广场: 矗立着数块玉璧，更新各种榜单
        - 酒楼: 天机阁开设的酒楼，在此谈论的消息都会被暗中记录。
        - 委托堂: 接受外界卜算委托

    中环:
      解释: 宗门弟子的生活与工作。
      主要设施:
        - 天机室: 独立静室，内设隔绝阵法，内门弟子们可在此学习
        - 星图馆: 穹顶建筑，内有小周天星斗
        - 卷宗楼: 存放普通情报的阁楼

    内环 :
      解释: 核心区域。
      主要设施:
        - 问天台: 悬空于悬崖最前端的祭台，阁主常在此推演太虚界走势。
        - 藏史阁: 深入悬崖内部的洞窟，封印着太虚界的历史，非阁主不可入
        - 轻语楼: 莫语和莫青的居所

与外界关系:
  虞王朝:
    关系: 合作
    描述: 天机阁为虞王朝推演国运，虞王朝则尊天机阁为“国教”，并保护天机阁
