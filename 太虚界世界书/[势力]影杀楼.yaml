势力名称: 影杀楼

基本信息:
  定位: 太虚界第一刺客组织
  核心理念: 收人钱财，替人消灾
  势力评级: 一流中等

修行体系:
  主修功法: 《无影绝命典》
  体系特点:
    - 影遁术: 可将肉身融入阴影之中
    - 一击必杀: 讲究蓄势与爆发，若一击不中则远遁千里
  辅助体系:
    - 毒煞道: 可学毒道，兵刃常年淬毒
    - 易容缩骨: 能改变容貌、体型和声音

规模与结构:
  组织架构:
    最高权力:
      - 影主: 身份成谜，只知其代号，无人知其真容。
    职能部门:
      - 悬红堂: 负责对外承接任务、评估风险与赏金定级
      - 谛听司: 负责搜集目标情报
      - 藏锋库: 提供各类兵刃、特殊暗器与逃遁法宝
      - 炼狱窟: 培养死士与训练新人之地
    人员构成:
      - 天字号: 宗门最强刺客
      - 地字号: 宗门中坚力量
      - 人字号: 负责处理普通修士或凡俗权贵
      - 隐元: 被洗脑培养的孩童

核心人物:
  厉千行:
    代号: 影主
    修为: 合体大圆满
    特质:
      - 无相无形: 据说他没有固定的脸，每一次出现都是不同的面孔。有人说他是男人，也有人说她是女人。
      - 绝对契约: 只要接下的单子，哪怕赔上整个分楼的性命也要完成。这也是影杀楼信誉的基石。

  白鹭:
    代号: 红鸢
    修为: 筑基后期
    特质:
      - 极寒之体: 天生体温极低，且没有任何体味，是天生的潜伏者。
      - 心存善念: 本是凡俗侠女，为报家仇加入影杀楼。虽然天赋卓绝，但每次杀人后都会在无人处偷偷呕吐，内心仍挣扎于“杀手”与“侠客”的身份之间。
      - 潜力股: 被厉千行暗中关注，认为她只要杀够一百人，就能磨灭最后的人性，成为最完美的杀戮机器。

宗门地理与设施:
  地理定位:
    区域: 东灵域 · 云霞山脉 · 幽影谷
    地貌: 谷口布有天然迷阵与剧毒瘴气，谷内怪石嶙峋，阴风怒号。

  总楼布局:
    描述: 建筑全部开凿于峡谷两侧的峭壁内部，外观几乎看不出痕迹，内部却别有洞天。
    区域详解:
      - 阎罗殿: 位于峡谷最深处的地下宫殿，是影主发布最高指令的地方。终年点着幽绿色的长明灯。
      - 任务碑林: 峡谷两侧，上面刻着各种悬赏任务。杀手们领取任务时，只需将神识烙印在石碑上。
      - 炼狱窟: 位于地下深处的封闭岩洞，数千名孤儿在此进行厮杀，只有活下来的人才能走出洞口成为“隐元”

  分楼通用布局:
    描述: 影杀楼的分舵遍布太虚界各大城池，通常伪装成不起眼的凡俗店铺
    常见伪装:
      - 棺材铺: 最常见的伪装。后院停放棺材的义庄往往是杀手的藏身处，棺材则是通往地下密室的入口。
      - 青楼后巷: 利用青楼的嘈杂掩盖血腥气，且方便收集情报。
      - 深夜面摊: 只在子时后出摊的流动铺子，通过特定的暗语点单来接头。
    内部设施:
      - 密室: 用于交接任务与领取赏金
      - 换形间
      - 尸池: 用于化尸毁迹

与外界关系:
  虞王朝:
    关系: 互相利用
    描述: 虞王朝官方严厉打击影杀楼，但暗地里不少皇室成员都会雇佣影杀楼去处理政敌

  合欢宗:
    关系: 合作
    描述: 合欢宗负责在床笫之间搜集情报与软肋，影杀楼负责动手杀人。两家经常共享情报网
