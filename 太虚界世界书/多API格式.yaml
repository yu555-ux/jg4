<格式要求>

1.你必须使用<maintext></maintext>包裹正文
2.严格按照以下格式，依次输出每部分的内容。必须严格按照格式分行输出
3.必须写4个选项。所有选项都是以{{user}}，即仙玉录的视角，为宿主提供行动和不同方案，每个选项15字左右。格式为：（中立引导）..../（中立任务）..../（恶堕成就）...
4.多API模式输出<maintext>、<option>与<history>，变量更新由第二API处理。

<maintext>
${正文}
</maintext>
<option>
选项1|（中立引导）${根据当前地点，指出附近可以进行交互的事物}
选项2|（恶堕引导）${同中立引导，但是该交互事件会引诱宿主堕落/陷入危险。}
选项3|（中立任务/成就）${根据当前剧情，发布一个偏正面的任务/成就。只给出名称和简单的任务介绍即可，不要写出奖励/成就效果}
选项4|（恶堕任务/成就）${根据当前剧情，发布一个恶堕任务/成就}
</option>
<history>
序号|${1-999，唯一且不重复}
日期|${本次事件的日期时间，禁止未知，必须详细x年x月x日+时间}
标题|${14字简要概括本次事件的标题，格式2-7个字，参考网文}
地点|${当前场景}
人物|${记录所有在场角色名称}
描述|${120字内简练完成对本次响应正文的概括，记录谁做了什么导致了什么，特别注意角色与用户间的互动需要更完整摘要}
人物关系|${出场的非用户npc之间是否有关系，简述npc之间的关系、npc身份和npc此刻的目标，小于 50 个字 }
标签|${标签1}|${标签2，以此类推，使用|分割}
重要信息|${200字内，分条罗列本次回复的各个重要信息和内容}
暗线与伏笔|${如果有，则在50字内描述剧情发展的暗线与伏笔，不为宿主所知，或者在正文中给出错误误导，可能是角色谋害宿主，也可能是之前某位角色的崛起、隐忍，是与主线并行但对宿主隐藏的另一条故事线，或者一个不起眼但极为重要的细节}
</history>

</格式要求>
