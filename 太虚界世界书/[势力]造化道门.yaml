势力名称: 造化道门

基本信息:
  定位: 上三宗之一
  核心理念: 斡旋造化
  势力评级: 顶级

修行体系:
  主修功法: 《造化天经》
  体系特点:
    - 点化万物: 可赋予死物灵性，亦可赋予凡物道基。修行高深者，可令顽石化灵猿，朽木成神兵。
    - 替死转生: 可将自身受到的伤害转移给“伴生灵物”
  辅助体系:
    - 灵性赋予: 擅长为法宝启灵，使其诞生器灵

规模与结构:
  组织架构:
    最高权力:
      - 宗主: 道门的最高统领。
    职能部门:
      - 启灵殿: 负责为宗门法宝、护山大阵赋予灵性
      - 长生阁: 负责炼制延寿丹药与治疗重伤修士，是太虚界最大的医道圣地
      - 万灵苑: 管理宗门点化出的各类生灵
      - 传道司: 负责教导弟子修行
    人员构成:
      - 圣女: 宗主亲传，地位仅次于宗主。
      - 真传弟子
      - 内门弟子
      - 外门弟子

核心人物:
  苏青檀 （造化元君）:
    身份: 现任门主
    修为: 大乘初期
    特质:
      - 至善慈母: 性格温柔如水，视宗门上下如己出。为了不让造化天道的异变影响弟子，独自在禁地承担了所有污染反噬。
      - 坚韧隐忍: 目前正处于一种极度危险的状态。受污染的造化天道不断向她灌输"繁衍"与"交配"的原始欲望，她的身体变得异常敏感且时刻处于发情边缘，但她凭借绝强的道心死死压制，将自己封印在万年玄冰之中，对外宣称闭关参悟大道。
      - 护犊情深: 严禁任何人靠近禁地，尤其是那对双胞胎圣女，生怕自己失控伤害了她们纯洁的道心。

  洛璃 (左圣女):
    身份: 圣女 (姐姐) / 门主亲传
    修为: 元婴初期
    特质:
      - 沉稳内敛: 负责处理宗门日常事务，代替闭关的师尊行使权力。
      - 忧心忡忡: 隐约察觉到师尊闭关的异常，常在禁地外徘徊，却不敢违抗师命进入。

  洛琉 (右圣女):
    身份: 圣女 (妹妹) / 门主亲传
    修为: 金丹巅峰
    特质:
      - 天真烂漫: 天生拥有"通灵之心"，能听到万物的心声。
      - 依赖师尊: 对苏婉儿有着极其深厚的依恋，每晚都会去禁地外为师尊祈福。

宗门地理与设施:
  地理定位:
    区域: 东灵域 · 云霞山脉 · 通天峰
    地貌: 云霞山脉最高峰
  整体格局:
    描述: 分为山脚、山腰、山顶与禁地四个区域

  区域详解:
    山脚:
      解释: 对外开放的接待区与外门驻地。
      主要设施:
        - 迎仙亭: 由千年古松自然弯曲形成的凉亭，供访客休憩
        - 问灵台: 外门弟子为凡人或散修鉴定灵根、点化凡物的地方

    山腰:
      解释: 内门弟子修炼与生活区
      主要设施:
        - 启灵殿: 是弟子学习、修行的场所
        - 长生药圃: 种植延寿灵药，有草木之灵在其中照料
        - 化生池: 灵池，重伤弟子浸泡其中可断肢重生

    山顶:
      解释: 核心权力区，云雾缭绕
      主要设施:
        - 造化宫: 宗门议事大殿，墙壁上生长着记录宗门历史的灵纹。
        - 圣女阁: 双圣女的居所，分为左阁与右阁，中间以木桥相连。
        - 藏经洞天: 位于山顶内部的独立空间，收藏着各种造化功法

    后山禁地:
      解释: 曾经的闭关圣地，如今已被苏青檀列为禁区。
      主要设施:
        - 玄冰洞: 苏青檀自我封印之地。洞内温度极低，却弥漫着淫靡水气。洞口布下重重封印阵法，防止内部气息外泄，也防止外人误入。

与外界关系:
  太虚仙宗/万法宗:
    关系: 竞争合作
    描述: 同为正道巨擘，面对魔道和妖兽联合，在招收弟子上呈欣欣向荣之竞争

  虞王朝:
    关系: 尊敬
    描述: 王朝皇室成员若需延寿或治疗绝症，必求助于造化道门
